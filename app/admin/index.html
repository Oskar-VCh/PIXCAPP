<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1B5E20">
    <title>Admin Login - PIXCAPP</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0B1120 0%, #0F172A 50%, #1B5E20 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%234CAF50' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
        }
        
        .login-wrapper { width: 100%; max-width: 460px; position: relative; z-index: 1; }
        
        .login-card {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(76, 175, 80, 0.2);
        }
        
        .login-header { text-align: center; margin-bottom: 2rem; }
        
        .logo-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4CAF50, #1B5E20);
            width: 70px;
            height: 70px;
            border-radius: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 20px -5px rgba(76, 175, 80, 0.3);
        }
        
        .logo-wrapper i { font-size: 2.5rem; color: white; }
        .login-title { font-size: 1.75rem; font-weight: 700; color: #F8FAFC; margin-bottom: 0.5rem; }
        .login-subtitle { color: #94A3B8; font-size: 0.875rem; }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: #94A3B8; margin-bottom: 0.5rem; }
        
        .input-group { position: relative; }
        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #4CAF50;
            font-size: 1rem;
        }
        
        .form-input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            color: #F8FAFC;
            background: #0F172A;
            border: 2px solid #334155;
            border-radius: 1rem;
            transition: all 0.2s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }
        
        .form-input::placeholder { color: #475569; }
        
        .login-btn {
            width: 100%;
            padding: 0.875rem;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #4CAF50, #1B5E20);
            border: none;
            border-radius: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }
        
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(76, 175, 80, 0.4); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .alert {
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.875rem;
            animation: slideIn 0.3s ease;
        }
        
        .alert-error { background: rgba(239, 68, 68, 0.1); border: 1px solid #EF4444; color: #EF4444; }
        .alert-success { background: rgba(34, 197, 94, 0.1); border: 1px solid #22C55E; color: #22C55E; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #334155;
        }
        
        .login-footer p { font-size: 0.7rem; color: #64748B; }
        .login-footer i { color: #4CAF50; }
        
        @media (max-width: 480px) {
            .login-card { padding: 1.75rem; }
            .logo-wrapper { width: 60px; height: 60px; }
            .logo-wrapper i { font-size: 2rem; }
            .login-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-wrapper"><i class="fas fa-leaf"></i></div>
                <h1 class="login-title">Bienvenido</h1>
                <p class="login-subtitle">Panel de administración - Acceso restringido</p>
            </div>
            
            <div id="alertContainer"></div>
            
            <div class="form-group">
                <label class="form-label">Usuario</label>
                <div class="input-group">
                    <i class="fas fa-user-shield"></i>
                    <input type="text" id="usuario" class="form-input" placeholder="Ingresa tu usuario" autocomplete="username">
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <div class="input-group">
                    <i class="fas fa-key"></i>
                    <input type="password" id="password" class="form-input" placeholder="Ingresa tu contraseña" autocomplete="current-password">
                </div>
            </div>
            
            <button type="button" class="login-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
            </button>
            
            <div class="login-footer">
                <p><i class="fas fa-shield-alt"></i> Acceso seguro - Todas las acciones son auditadas</p>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('usuario').focus();
        
        function showAlert(message, type = 'error') {
            const container = document.getElementById('alertContainer');
            const icon = type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle';
            container.innerHTML = `<div class="alert alert-${type}"><i class="fas ${icon}"></i><span>${message}</span></div>`;
            setTimeout(() => { if (container.innerHTML) container.innerHTML = ''; }, 5000);
        }
        
        // Evento del botón
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const usuario = document.getElementById('usuario').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const originalHtml = btn.innerHTML;
            
            if (!usuario) {
                showAlert('Por favor, ingresa tu usuario', 'error');
                document.getElementById('usuario').focus();
                return;
            }
            
            if (!password) {
                showAlert('Por favor, ingresa tu contraseña', 'error');
                document.getElementById('password').focus();
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Verificando credenciales...';
            
            try {
                const response = await fetch('../../api/admin/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('pixcapp_token', data.token);
                    localStorage.setItem('pixcapp_user', JSON.stringify(data.user));
                    showAlert('Inicio de sesión exitoso. Redirigiendo...', 'success');
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                } else {
                    showAlert(data.message || 'Usuario o contraseña incorrectos', 'error');
                    btn.disabled = false;
                    btn.innerHTML = originalHtml;
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            } catch (error) {
                showAlert('Error de conexión: ' + error.message, 'error');
                btn.disabled = false;
                btn.innerHTML = originalHtml;
            }
        });
        
        // Permitir Enter en los inputs
        document.getElementById('usuario').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
        
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
    </script>
</body>
</html>
