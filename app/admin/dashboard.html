<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#2E7D32">
    <title>Dashboard Admin - PIXCAPP</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        :root {
            --color-primary: #2E7D32;
            --color-primary-light: #4CAF50;
            --color-primary-dark: #1B5E20;
            --color-primary-soft: #E8F5E9;
            --color-background: #F5F7FA;
            --color-surface: #FFFFFF;
            --color-text-primary: #1A202C;
            --color-text-secondary: #2D3748;
            --color-text-muted: #4A5568;
            --color-border: #E2E8F0;
            --color-success: #38A169;
            --color-warning: #ED8936;
            --color-error: #E53E3E;
            --color-info: #3182CE;
            --sidebar-width: 260px;
            --header-height: 60px;
            --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.5rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-full: 9999px;
            --transition: all 0.25s ease;
        }
        
        [data-theme="dark"] {
            --color-primary: #66BB6A;
            --color-primary-light: #81C784;
            --color-primary-dark: #388E3C;
            --color-primary-soft: #1B2E1F;
            --color-background: #0F172A;
            --color-surface: #1E293B;
            --color-text-primary: #F8FAFC;
            --color-text-secondary: #E2E8F0;
            --color-text-muted: #94A3B8;
            --color-border: #334155;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-background);
            color: var(--color-text-primary);
            min-height: 100vh;
            transition: var(--transition);
        }
        
        .app-container { display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--color-surface);
            border-right: 1px solid var(--color-border);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 200;
            transition: transform 0.3s ease;
            transform: translateX(0);
            display: flex;
            flex-direction: column;
        }
        .sidebar.collapsed { transform: translateX(-100%); }
        
        .sidebar-header {
            padding: var(--spacing-lg);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }
        .sidebar-logo { height: 36px; width: auto; }
        body:not([data-theme="dark"]) .sidebar-logo { filter: brightness(0) invert(0); }
        [data-theme="dark"] .sidebar-logo { filter: brightness(0) invert(1); }
        .sidebar-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--color-primary);
        }
        
        .sidebar-user {
            padding: var(--spacing-lg);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }
        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-full);
            background: var(--color-primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            overflow: hidden;
        }
        .user-name { font-weight: 600; font-size: 0.9375rem; }
        .user-role {
            font-size: 0.75rem;
            color: var(--color-text-muted);
            text-transform: uppercase;
        }
        
        .sidebar-nav {
            flex: 1;
            padding: var(--spacing-md);
            overflow-y: auto;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            padding: var(--spacing-md);
            color: var(--color-text-secondary);
            text-decoration: none;
            border-radius: var(--radius-md);
            transition: var(--transition);
            margin-bottom: 2px;
            font-size: 0.9375rem;
        }
        .nav-item i { width: 22px; font-size: 1.1rem; text-align: center; }
        .nav-item:hover {
            background: var(--color-background);
            color: var(--color-primary);
        }
        .nav-item.active {
            background: var(--color-primary);
            color: white;
        }
        
        .sidebar-footer {
            padding: var(--spacing-lg);
            border-top: 1px solid var(--color-border);
        }
        .connection-status {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: 0.8125rem;
            color: var(--color-text-muted);
            margin-bottom: var(--spacing-md);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-success);
        }
        .status-dot.offline { background: var(--color-error); }
        
        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            transition: margin-left 0.3s ease;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .main-content.expanded { margin-left: 0; }
        
        /* Header */
        .header {
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            padding: 0 var(--spacing-xl);
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: var(--header-height);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .header-left { display: flex; align-items: center; gap: var(--spacing-md); }
        .sidebar-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.35rem;
            color: var(--color-text-primary);
            cursor: pointer;
            padding: var(--spacing-sm);
        }
        .page-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--color-text-primary);
        }
        
        /* Content */
        .content {
            flex: 1;
            padding: var(--spacing-xl);
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }
        
        .stat-card {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            padding: var(--spacing-lg);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--color-primary);
        }
        
        .stat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--spacing-md);
        }
        
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }
        
        .stat-icon.users { background: rgba(46,125,32,0.1); color: var(--color-primary); }
        .stat-icon.parcelas { background: rgba(49,130,206,0.1); color: var(--color-info); }
        .stat-icon.pendientes { background: rgba(237,137,54,0.1); color: var(--color-warning); }
        .stat-icon.eventos { background: rgba(139,92,246,0.1); color: #8B5CF6; }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-text-primary);
            line-height: 1.2;
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--color-text-muted);
            margin-top: var(--spacing-xs);
        }
        
        .stat-trend {
            font-size: 0.7rem;
            margin-top: var(--spacing-sm);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .trend-up { color: var(--color-success); }
        .trend-down { color: var(--color-error); }
        
        /* Charts Row */
        .charts-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--spacing-xl);
            margin-bottom: var(--spacing-xl);
        }
        
        .chart-card {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            overflow: hidden;
        }
        
        .chart-header {
            padding: var(--spacing-lg) var(--spacing-xl);
            border-bottom: 1px solid var(--color-border);
            background: var(--color-background);
        }
        
        .chart-header h3 {
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        
        .chart-header h3 i {
            color: var(--color-primary);
        }
        
        .chart-body {
            padding: var(--spacing-xl);
        }
        
        .chart-container {
            height: 280px;
            position: relative;
        }
        
        /* Tables */
        .card {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            overflow: hidden;
            margin-bottom: var(--spacing-xl);
        }
        
        .card-header {
            padding: var(--spacing-lg) var(--spacing-xl);
            border-bottom: 1px solid var(--color-border);
            background: var(--color-background);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: var(--spacing-md);
        }
        
        .card-header h3 {
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        
        .card-header h3 i {
            color: var(--color-primary);
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        
        .data-table th,
        .data-table td {
            padding: var(--spacing-sm) var(--spacing-xl);
            text-align: left;
            border-bottom: 1px solid var(--color-border);
        }
        
        .data-table th {
            color: var(--color-text-muted);
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            background: rgba(0,0,0,0.02);
        }
        
        .data-table tr:hover {
            background: rgba(0,0,0,0.02);
        }
        
        [data-theme="dark"] .data-table tr:hover {
            background: rgba(255,255,255,0.02);
        }
        
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: var(--radius-full);
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .badge-success { background: rgba(56,161,105,0.1); color: var(--color-success); }
        .badge-warning { background: rgba(237,137,54,0.1); color: var(--color-warning); }
        .badge-info { background: rgba(49,130,206,0.1); color: var(--color-info); }
        .badge-error { background: rgba(229,62,62,0.1); color: var(--color-error); }
        
        .btn-sm {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            padding: 0.3rem 0.7rem;
            font-size: 0.7rem;
            font-weight: 500;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--color-text-secondary);
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }
        
        .btn-sm:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }
        
        .empty-state {
            text-align: center;
            padding: var(--spacing-xl);
            color: var(--color-text-muted);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: var(--spacing-md);
        }
        
        .loading-state {
            text-align: center;
            padding: var(--spacing-xl);
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--color-border);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto var(--spacing-md);
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .offline-banner {
            background: var(--color-warning);
            color: white;
            padding: var(--spacing-sm) var(--spacing-xl);
            text-align: center;
            font-size: 0.8rem;
            display: none;
        }
        
        .offline-banner.show { display: block; }
        
        @media (max-width: 1024px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .charts-row { grid-template-columns: 1fr; gap: var(--spacing-lg); }
        }
        
        @media (max-width: 768px) {
            .sidebar { display: none !important; }
            .sidebar-toggle { display: none !important; }
            .main-content { margin-left: 0 !important; }
            .header { padding: 0 var(--spacing-md); }
            .content { padding: var(--spacing-md); }
            .stats-grid { grid-template-columns: 1fr; gap: var(--spacing-md); }
            .data-table { font-size: 0.7rem; }
            .data-table th, .data-table td { padding: var(--spacing-xs) var(--spacing-sm); }
            .chart-container { height: 220px; }
        }
        
        @media (min-width: 769px) {
            .sidebar-toggle { display: flex; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="../../assets/img/logo.png" alt="PIXCAPP" class="sidebar-logo" onerror="this.src='https://placehold.co/36x36/2E7D32/white?text=P'">
                <span class="sidebar-title">PIXCAPP Admin</span>
            </div>
            <div class="sidebar-user">
                <div class="user-avatar" id="userAvatar"><i class="fas fa-user-shield"></i></div>
                <div class="user-info">
                    <div class="user-name" id="sidebarUserName">Cargando...</div>
                    <div class="user-role">Administrador</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item active"><i class="fas fa-home"></i> Dashboard</a>
                <a href="usuarios.html" class="nav-item"><i class="fas fa-users"></i> Usuarios</a>
                <a href="validaciones.html" class="nav-item"><i class="fas fa-check-circle"></i> Validaciones</a>
                <a href="parcelas.html" class="nav-item"><i class="fas fa-seedling"></i> Parcelas</a>
                <a href="asignaciones.html" class="nav-item"><i class="fas fa-link"></i> Asignaciones</a>
                <a href="taxonomia.html" class="nav-item"><i class="fas fa-book"></i> Taxonomía</a>
                <a href="logs.html" class="nav-item"><i class="fas fa-history"></i> Logs</a>
                <a href="ajustes.html" class="nav-item"><i class="fas fa-cog"></i> Ajustes</a>
            </nav>
            <div class="sidebar-footer">
                <div class="connection-status">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">En línea</span>
                </div>
                <button class="nav-item" id="logoutBtn" style="width:100%;margin-top:var(--spacing-md);border:none;background:none;cursor:pointer;">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </div>
        </aside>
        
        <main class="main-content" id="mainContent">
            <div class="offline-banner" id="offlineBanner">
                <i class="fas fa-wifi-slash"></i> Modo sin conexión
            </div>
            
            <header class="header">
                <div class="header-left">
                    <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
                    <h1 class="page-title">Dashboard</h1>
                </div>
            </header>
            
            <div class="content" id="mainContentArea">
                <div class="loading-state">
                    <div class="loading-spinner"></div>
                    <p>Cargando información...</p>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        // Tema
        (function(){ 
            const theme = localStorage.getItem('theme') || 'light'; 
            document.body.setAttribute('data-theme', theme); 
        })();
        
        window.addEventListener('storage', (e) => { 
            if(e.key === 'theme') document.body.setAttribute('data-theme', e.newValue || 'light'); 
        });
        
        const API = '../../api';
        let currentUser = null;
        let charts = {};
        
        function updateConnection() {
            const isOnline = navigator.onLine;
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const offlineBanner = document.getElementById('offlineBanner');
            if (statusDot) statusDot.className = 'status-dot' + (isOnline ? '' : ' offline');
            if (statusText) statusText.textContent = isOnline ? 'En línea' : 'Sin conexión';
            if (offlineBanner) offlineBanner.classList.toggle('show', !isOnline);
        }
        
        async function checkAuth() {
            const token = localStorage.getItem('pixcapp_token');
            const user = JSON.parse(localStorage.getItem('pixcapp_user') || '{}');
            if (!token || !user.id || user.rol !== 'admin') {
                window.location.href = 'index.html';
                return false;
            }
            currentUser = user;
            document.getElementById('sidebarUserName').textContent = user.nombre || 'Admin';
            document.getElementById('userAvatar').innerHTML = '<i class="fas fa-user-shield"></i>';
            return true;
        }
        
        function destroyCharts() {
            Object.keys(charts).forEach(key => {
                if (charts[key]) { charts[key].destroy(); charts[key] = null; }
            });
        }
        
        async function loadDashboard() {
            const token = localStorage.getItem('pixcapp_token');
            const container = document.getElementById('mainContentArea');
            container.innerHTML = '<div class="loading-state"><div class="loading-spinner"></div><p>Cargando información...</p></div>';
            
            try {
                const response = await fetch(`${API}/admin/dashboard.php?t=${Date.now()}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await response.json();
                
                if (data.success) {
                    renderDashboard(data);
                    localStorage.setItem('pixcapp_admin_dashboard', JSON.stringify(data));
                } else {
                    throw new Error(data.message || 'Error al cargar datos');
                }
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Error al cargar el dashboard</p>
                        <button class="btn-sm" onclick="location.reload()" style="margin-top:1rem;">Reintentar</button>
                    </div>
                `;
            }
        }
        
        function renderDashboard(data) {
            const container = document.getElementById('mainContentArea');
            const stats = data.stats || {};
            
            container.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon users"><i class="fas fa-users"></i></div>
                        </div>
                        <div class="stat-value">${formatNumber(stats.usuarios || 0)}</div>
                        <div class="stat-label">Usuarios registrados</div>
                        <div class="stat-trend"><i class="fas fa-arrow-up trend-up"></i> <span class="trend-up">+12%</span> vs mes anterior</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon parcelas"><i class="fas fa-seedling"></i></div>
                        </div>
                        <div class="stat-value">${formatNumber(stats.parcelas || 0)}</div>
                        <div class="stat-label">Parcelas activas</div>
                        <div class="stat-trend"><i class="fas fa-arrow-up trend-up"></i> <span class="trend-up">+5%</span> vs mes anterior</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon pendientes"><i class="fas fa-clock"></i></div>
                        </div>
                        <div class="stat-value">${stats.pendientes || 0}</div>
                        <div class="stat-label">Validaciones pendientes</div>
                        <div class="stat-trend"><i class="fas fa-arrow-down trend-down"></i> <span class="trend-down">-2</span> vs mes anterior</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon eventos"><i class="fas fa-calendar-week"></i></div>
                        </div>
                        <div class="stat-value">${formatNumber(stats.eventos_mes || 0)}</div>
                        <div class="stat-label">Eventos este mes</div>
                        <div class="stat-trend"><i class="fas fa-arrow-up trend-up"></i> <span class="trend-up">+18%</span> vs mes anterior</div>
                    </div>
                </div>
                
                <div class="charts-row">
                    <div class="chart-card">
                        <div class="chart-header">
                            <h3><i class="fas fa-chart-line"></i> Crecimiento de Usuarios</h3>
                        </div>
                        <div class="chart-body">
                            <div class="chart-container">
                                <canvas id="usuariosChart"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="chart-card">
                        <div class="chart-header">
                            <h3><i class="fas fa-chart-pie"></i> Distribución por Rol</h3>
                        </div>
                        <div class="chart-body">
                            <div class="chart-container">
                                <canvas id="rolesChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="charts-row">
                    <div class="chart-card">
                        <div class="chart-header">
                            <h3><i class="fas fa-chart-bar"></i> Eventos por Tipo</h3>
                        </div>
                        <div class="chart-body">
                            <div class="chart-container">
                                <canvas id="eventosChart"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="chart-card">
                        <div class="chart-header">
                            <h3><i class="fas fa-chart-line"></i> Actividad Semanal</h3>
                        </div>
                        <div class="chart-body">
                            <div class="chart-container">
                                <canvas id="actividadChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-clock"></i> Ingenieros Pendientes de Validación</h3>
                        <a href="validaciones.html" class="btn-sm">Ver todos</a>
                    </div>
                    ${renderPendientesTable(data.pendientes)}
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-history"></i> Últimos Usuarios Registrados</h3>
                        <a href="usuarios.html" class="btn-sm">Ver todos</a>
                    </div>
                    ${renderUltimosTable(data.ultimos)}
                </div>
            `;
            
            setTimeout(() => {
                destroyCharts();
                renderCharts(data);
            }, 100);
        }
        
        function renderCharts(data) {
            const chartColors = {
                primary: '#2E7D32',
                success: '#38A169',
                warning: '#ED8936',
                info: '#3182CE',
                purple: '#8B5CF6'
            };
            
            // Gráfico 1: Crecimiento de usuarios
            const usuariosCanvas = document.getElementById('usuariosChart');
            if (usuariosCanvas) {
                const labels = data.usuarios_por_mes?.map(m => m.mes) || ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun'];
                const values = data.usuarios_por_mes?.map(m => m.total) || [0, 0, 0, 0, 0, 0];
                
                charts.usuarios = new Chart(usuariosCanvas, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Nuevos usuarios',
                            data: values,
                            borderColor: chartColors.primary,
                            backgroundColor: 'rgba(46,125,50,0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            fill: true,
                            pointBackgroundColor: chartColors.primary,
                            pointBorderColor: '#fff',
                            pointRadius: 4,
                            pointHoverRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { position: 'top' } },
                        scales: { y: { beginAtZero: true } }
                    }
                });
            }
            
            // Gráfico 2: Distribución por rol
            const rolesCanvas = document.getElementById('rolesChart');
            if (rolesCanvas) {
                const rolesMap = { agricultor: 'Agricultores', ingeniero: 'Ingenieros', admin: 'Administradores' };
                const labels = data.roles_distribucion?.map(r => rolesMap[r.rol] || r.rol) || ['Agricultores', 'Ingenieros', 'Administradores'];
                const values = data.roles_distribucion?.map(r => r.total) || [0, 0, 0];
                
                charts.roles = new Chart(rolesCanvas, {
                    type: 'doughnut',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: values,
                            backgroundColor: [chartColors.success, chartColors.info, chartColors.purple],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { position: 'bottom' } }
                    }
                });
            }
            
            // Gráfico 3: Eventos por tipo
            const eventosCanvas = document.getElementById('eventosChart');
            if (eventosCanvas) {
                const tiposMap = { riego: 'Riegos', fertilizacion: 'Fertilizaciones', plaga: 'Plagas', foto: 'Fotos' };
                const labels = data.eventos_por_tipo?.map(e => tiposMap[e.tipo] || e.tipo) || ['Riegos', 'Fertilizaciones', 'Plagas', 'Fotos'];
                const values = data.eventos_por_tipo?.map(e => e.total) || [0, 0, 0, 0];
                
                charts.eventos = new Chart(eventosCanvas, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Cantidad de eventos',
                            data: values,
                            backgroundColor: chartColors.primary,
                            borderRadius: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true } }
                    }
                });
            }
            
            // Gráfico 4: Actividad semanal
            const actividadCanvas = document.getElementById('actividadChart');
            if (actividadCanvas) {
                const labels = data.actividad_semanal?.map(a => a.dia) || ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];
                const values = data.actividad_semanal?.map(a => a.total) || [0, 0, 0, 0, 0, 0, 0];
                
                charts.actividad = new Chart(actividadCanvas, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Actividad',
                            data: values,
                            borderColor: chartColors.info,
                            backgroundColor: 'rgba(49,130,206,0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            fill: true,
                            pointBackgroundColor: chartColors.info,
                            pointBorderColor: '#fff',
                            pointRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: { y: { beginAtZero: true } }
                    }
                });
            }
        }
        
        function renderPendientesTable(pendientes) {
            if (!pendientes || pendientes.length === 0) {
                return '<div class="empty-state"><i class="fas fa-check-circle"></i><p>No hay validaciones pendientes</p></div>';
            }
            
            return `
                <table class="data-table">
                    <thead>
                        <tr><th>Nombre</th><th>Teléfono</th><th>Cédula</th><th>Fecha</th><th></th></tr>
                    </thead>
                    <tbody>
                        ${pendientes.slice(0, 5).map(p => `
                            <tr>
                                <td><strong>${escapeHtml(p.nombre)}</strong></td>
                                <td>${p.telefono || '-'}</td>
                                <td>${p.cedula || '-'}</td>
                                <td>${formatDate(p.fecha)}</td>
                                <td><a href="validaciones.html" class="btn-sm">Revisar</a></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }
        
        function renderUltimosTable(ultimos) {
            if (!ultimos || ultimos.length === 0) {
                return '<div class="empty-state"><i class="fas fa-inbox"></i><p>No hay registros recientes</p></div>';
            }
            
            const rolClass = { agricultor: 'badge-success', ingeniero: 'badge-info', admin: 'badge-warning' };
            const rolText = { agricultor: 'Agricultor', ingeniero: 'Ingeniero', admin: 'Admin' };
            
            return `
                <table class="data-table">
                    <thead>
                        <tr><th>Nombre</th><th>Rol</th><th>Fecha</th><th></th></tr>
                    </thead>
                    <tbody>
                        ${ultimos.slice(0, 5).map(u => `
                            <tr>
                                <td><strong>${escapeHtml(u.nombre)}</strong></td>
                                <td><span class="badge ${rolClass[u.rol]}">${rolText[u.rol] || u.rol}</span></td>
                                <td>${formatDate(u.fecha)}</td>
                                <td><a href="usuarios.html" class="btn-sm">Ver</a></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }
        
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
            return num.toString();
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleDateString('es-MX');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
        
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('sidebarToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('collapsed');
            document.getElementById('mainContent').classList.toggle('expanded');
        });
        
        updateConnection();
        window.addEventListener('online', updateConnection);
        window.addEventListener('offline', updateConnection);
        
        (async() => {
            if (await checkAuth()) {
                loadDashboard();
            }
        })();
    </script>
</body>
</html>
