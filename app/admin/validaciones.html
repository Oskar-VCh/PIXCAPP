<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#2E7D32">
    <title>Validaciones - Admin PIXCAPP</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color-primary: #2E7D32;
            --color-primary-light: #4CAF50;
            --color-primary-dark: #1B5E20;
            --color-background: #F5F7FA;
            --color-surface: #FFFFFF;
            --color-text-primary: #1A202C;
            --color-text-secondary: #2D3748;
            --color-text-muted: #4A5568;
            --color-border: #E2E8F0;
            --color-success: #38A169;
            --color-warning: #ED8936;
            --color-error: #E53E3E;
            --color-info: #3182CE;
            --sidebar-width: 260px;
            --header-height: 60px;
            --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.5rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-full: 9999px;
            --transition: all 0.25s ease;
        }
        
        [data-theme="dark"] {
            --color-primary: #66BB6A;
            --color-primary-light: #81C784;
            --color-primary-dark: #388E3C;
            --color-background: #0F172A;
            --color-surface: #1E293B;
            --color-text-primary: #F8FAFC;
            --color-text-secondary: #E2E8F0;
            --color-text-muted: #94A3B8;
            --color-border: #334155;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-background);
            color: var(--color-text-primary);
            min-height: 100vh;
            transition: var(--transition);
        }
        
        .app-container { display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--color-surface);
            border-right: 1px solid var(--color-border);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 200;
            transition: transform 0.3s ease;
            transform: translateX(0);
            display: flex;
            flex-direction: column;
        }
        .sidebar.collapsed { transform: translateX(-100%); }
        
        .sidebar-header {
            padding: var(--spacing-lg);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }
        .sidebar-logo { height: 36px; width: auto; }
        body:not([data-theme="dark"]) .sidebar-logo { filter: brightness(0) invert(0); }
        [data-theme="dark"] .sidebar-logo { filter: brightness(0) invert(1); }
        .sidebar-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--color-primary);
        }
        
        .sidebar-user {
            padding: var(--spacing-lg);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }
        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-full);
            background: var(--color-primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            overflow: hidden;
        }
        .user-name { font-weight: 600; font-size: 0.9375rem; }
        .user-role {
            font-size: 0.75rem;
            color: var(--color-text-muted);
            text-transform: uppercase;
        }
        
        .sidebar-nav {
            flex: 1;
            padding: var(--spacing-md);
            overflow-y: auto;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            padding: var(--spacing-md);
            color: var(--color-text-secondary);
            text-decoration: none;
            border-radius: var(--radius-md);
            transition: var(--transition);
            margin-bottom: 2px;
            font-size: 0.9375rem;
        }
        .nav-item i { width: 22px; font-size: 1.1rem; text-align: center; }
        .nav-item:hover {
            background: var(--color-background);
            color: var(--color-primary);
        }
        .nav-item.active {
            background: var(--color-primary);
            color: white;
        }
        
        .sidebar-footer {
            padding: var(--spacing-lg);
            border-top: 1px solid var(--color-border);
        }
        .connection-status {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: 0.8125rem;
            color: var(--color-text-muted);
            margin-bottom: var(--spacing-md);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-success);
        }
        .status-dot.offline { background: var(--color-error); }
        
        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            transition: margin-left 0.3s ease;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .main-content.expanded { margin-left: 0; }
        
        /* Header */
        .header {
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            padding: 0 var(--spacing-xl);
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: var(--header-height);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .header-left { display: flex; align-items: center; gap: var(--spacing-md); }
        .sidebar-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.35rem;
            color: var(--color-text-primary);
            cursor: pointer;
            padding: var(--spacing-sm);
        }
        .page-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--color-text-primary);
        }
        
        /* Content */
        .content {
            flex: 1;
            padding: var(--spacing-xl);
        }
        
        /* Stats summary */
        .stats-summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }
        
        .stat-card {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            padding: var(--spacing-lg);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            transition: var(--transition);
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .stat-icon {
            width: 52px;
            height: 52px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }
        .stat-icon.yellow { background: rgba(237,137,54,0.1); color: var(--color-warning); }
        .stat-icon.green { background: rgba(56,161,105,0.1); color: var(--color-success); }
        .stat-icon.red { background: rgba(229,62,62,0.1); color: var(--color-error); }
        
        .stat-info h3 { font-size: 1.75rem; font-weight: 700; }
        .stat-info p { font-size: 0.75rem; color: var(--color-text-muted); }
        
        /* Card */
        .card {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            overflow: hidden;
        }
        
        .card-header {
            padding: var(--spacing-lg) var(--spacing-xl);
            border-bottom: 1px solid var(--color-border);
            background: var(--color-background);
        }
        
        .card-header h2 {
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        
        .card-header h2 i {
            color: var(--color-warning);
        }
        
        /* Lista de validaciones */
        .validaciones-list {
            padding: var(--spacing-md);
        }
        
        .validacion-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            padding: var(--spacing-lg);
            background: var(--color-background);
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-md);
            transition: var(--transition);
            border: 1px solid var(--color-border);
        }
        
        .validacion-item:hover {
            transform: translateX(4px);
            border-color: var(--color-primary);
        }
        
        .validacion-avatar {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        
        .validacion-info {
            flex: 1;
        }
        
        .validacion-info h4 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: var(--spacing-xs);
        }
        
        .validacion-info p {
            font-size: 0.8rem;
            color: var(--color-text-muted);
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-md);
        }
        
        .validacion-info p i {
            width: 16px;
            color: var(--color-primary);
        }
        
        .validacion-actions {
            display: flex;
            gap: var(--spacing-sm);
            flex-shrink: 0;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
        }
        
        .btn-success {
            background: var(--color-success);
            color: white;
        }
        
        .btn-success:hover {
            background: #2F855A;
            transform: translateY(-1px);
        }
        
        .btn-danger {
            background: transparent;
            border: 1px solid var(--color-error);
            color: var(--color-error);
        }
        
        .btn-danger:hover {
            background: var(--color-error);
            color: white;
        }
        
        .empty-state {
            text-align: center;
            padding: var(--spacing-xl);
            color: var(--color-text-muted);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: var(--spacing-md);
        }
        
        .loading-state {
            text-align: center;
            padding: var(--spacing-xl);
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--color-border);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto var(--spacing-md);
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        
        .modal {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            width: 90%;
            max-width: 450px;
            border: 1px solid var(--color-border);
        }
        
        .modal h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: var(--spacing-md);
        }
        
        .modal textarea {
            width: 100%;
            padding: 0.75rem;
            background: var(--color-background);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            color: var(--color-text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            resize: vertical;
        }
        
        .modal textarea:focus {
            outline: none;
            border-color: var(--color-primary);
        }
        
        .modal-actions {
            display: flex;
            gap: var(--spacing-md);
            justify-content: flex-end;
            margin-top: var(--spacing-lg);
        }
        
        .offline-banner {
            background: var(--color-warning);
            color: white;
            padding: var(--spacing-sm) var(--spacing-xl);
            text-align: center;
            font-size: 0.8rem;
            display: none;
        }
        .offline-banner.show { display: block; }
        
        @media (max-width: 768px) {
            .sidebar { display: none !important; }
            .sidebar-toggle { display: none !important; }
            .main-content { margin-left: 0 !important; }
            .header { padding: 0 var(--spacing-md); }
            .content { padding: var(--spacing-md); }
            .stats-summary { grid-template-columns: repeat(2, 1fr); gap: var(--spacing-md); }
            .validacion-item { flex-direction: column; text-align: center; }
            .validacion-actions { margin-top: var(--spacing-md); }
            .validacion-info p { justify-content: center; }
        }
        
        @media (min-width: 769px) {
            .sidebar-toggle { display: flex; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="../../assets/img/logo.png" alt="PIXCAPP" class="sidebar-logo" onerror="this.src='https://placehold.co/36x36/2E7D32/white?text=P'">
                <span class="sidebar-title">PIXCAPP Admin</span>
            </div>
            <div class="sidebar-user">
                <div class="user-avatar" id="userAvatar"><i class="fas fa-user-shield"></i></div>
                <div class="user-info">
                    <div class="user-name" id="sidebarUserName">Cargando...</div>
                    <div class="user-role">Administrador</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="usuarios.html" class="nav-item"><i class="fas fa-users"></i> Usuarios</a>
                <a href="validaciones.html" class="nav-item active"><i class="fas fa-check-circle"></i> Validaciones</a>
                <a href="parcelas.html" class="nav-item"><i class="fas fa-seedling"></i> Parcelas</a>
                <a href="asignaciones.html" class="nav-item"><i class="fas fa-link"></i> Asignaciones</a>
                <a href="taxonomia.html" class="nav-item"><i class="fas fa-book"></i> Taxonomía</a>
                <a href="logs.html" class="nav-item"><i class="fas fa-history"></i> Logs</a>
                <a href="ajustes.html" class="nav-item"><i class="fas fa-cog"></i> Ajustes</a>
            </nav>
            <div class="sidebar-footer">
                <div class="connection-status">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">En línea</span>
                </div>
                <button class="nav-item" id="logoutBtn" style="width:100%;margin-top:var(--spacing-md);border:none;background:none;cursor:pointer;">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </div>
        </aside>
        
        <main class="main-content" id="mainContent">
            <div class="offline-banner" id="offlineBanner">
                <i class="fas fa-wifi-slash"></i> Modo sin conexión
            </div>
            
            <header class="header">
                <div class="header-left">
                    <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
                    <h1 class="page-title">Validaciones</h1>
                </div>
            </header>
            
            <div class="content">
                <div class="stats-summary" id="statsSummary">
                    <div class="stat-card">
                        <div class="stat-icon yellow"><i class="fas fa-clock"></i></div>
                        <div class="stat-info">
                            <h3 id="pendientesCount">0</h3>
                            <p>Pendientes</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
                        <div class="stat-info">
                            <h3 id="aprobadosCount">0</h3>
                            <p>Aprobados</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon red"><i class="fas fa-times-circle"></i></div>
                        <div class="stat-info">
                            <h3 id="rechazadosCount">0</h3>
                            <p>Rechazados</p>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-user-check"></i> Ingenieros por Validar</h2>
                    </div>
                    <div class="validaciones-list" id="validacionesList">
                        <div class="loading-state">
                            <div class="loading-spinner"></div>
                            <p>Cargando solicitudes...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Modal de rechazo -->
    <div class="modal-overlay" id="rejectModal">
        <div class="modal">
            <h3><i class="fas fa-comment"></i> Motivo de Rechazo</h3>
            <textarea id="rejectMotivo" rows="3" placeholder="Explica el motivo del rechazo..."></textarea>
            <div class="modal-actions">
                <button class="btn btn-danger" onclick="closeRejectModal()">Cancelar</button>
                <button class="btn btn-success" id="confirmRejectBtn">Confirmar Rechazo</button>
            </div>
        </div>
    </div>
    
    <script>
        // Tema
        (function(){ 
            const theme = localStorage.getItem('theme') || 'light'; 
            document.body.setAttribute('data-theme', theme); 
        })();
        
        const API = '../../api';
        let currentUser = null;
        let currentRejectId = null;
        
        function updateConnection() {
            const isOnline = navigator.onLine;
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const offlineBanner = document.getElementById('offlineBanner');
            if (statusDot) statusDot.className = 'status-dot' + (isOnline ? '' : ' offline');
            if (statusText) statusText.textContent = isOnline ? 'En línea' : 'Sin conexión';
            if (offlineBanner) offlineBanner.classList.toggle('show', !isOnline);
        }
        
        async function checkAuth() {
            const token = localStorage.getItem('pixcapp_token');
            const user = JSON.parse(localStorage.getItem('pixcapp_user') || '{}');
            if (!token || !user.id || user.rol !== 'admin') {
                window.location.href = 'index.html';
                return false;
            }
            currentUser = user;
            document.getElementById('sidebarUserName').textContent = user.nombre || 'Admin';
            return true;
        }
        
        async function loadValidaciones() {
            const token = localStorage.getItem('pixcapp_token');
            const container = document.getElementById('validacionesList');
            
            try {
                const response = await fetch(`${API}/admin/validaciones.php`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await response.json();
                
                if (data.success) {
                    updateStats(data.pendientes.length);
                    renderValidaciones(data.pendientes);
                } else {
                    throw new Error(data.message);
                }
            } catch (error) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error al cargar: ${error.message}</p></div>`;
            }
        }
        
        function updateStats(pendientes) {
            document.getElementById('pendientesCount').textContent = pendientes;
            // Estos valores deberían venir del endpoint idealmente
            document.getElementById('aprobadosCount').textContent = '0';
            document.getElementById('rechazadosCount').textContent = '0';
        }
        
        function renderValidaciones(pendientes) {
            const container = document.getElementById('validacionesList');
            
            if (!pendientes || pendientes.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-check-circle"></i><p>No hay ingenieros pendientes de validación</p></div>`;
                return;
            }
            
            container.innerHTML = pendientes.map(p => {
                const iniciales = p.nombre.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
                return `
                    <div class="validacion-item" data-id="${p.id}">
                        <div class="validacion-avatar">${iniciales}</div>
                        <div class="validacion-info">
                            <h4>${escapeHtml(p.nombre)}</h4>
                            <p>
                                <span><i class="fas fa-phone"></i> ${p.telefono || 'N/A'}</span>
                                <span><i class="fas fa-id-card"></i> Cédula: ${p.cedula || 'N/A'}</span>
                                <span><i class="fas fa-calendar"></i> Solicitud: ${formatDate(p.fecha)}</span>
                            </p>
                        </div>
                        <div class="validacion-actions">
                            <button class="btn btn-success" onclick="aprobarIngeniero(${p.id})">
                                <i class="fas fa-check"></i> Aprobar
                            </button>
                            <button class="btn btn-danger" onclick="abrirRechazo(${p.id})">
                                <i class="fas fa-times"></i> Rechazar
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        async function aprobarIngeniero(id) {
            if (!confirm('¿Aprobar la validación de este ingeniero?')) return;
            
            const token = localStorage.getItem('pixcapp_token');
            
            try {
                const response = await fetch(`${API}/admin/validaciones.php`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ id, accion: 'aprobar' })
                });
                const data = await response.json();
                
                if (data.success) {
                    loadValidaciones();
                } else {
                    alert(data.message || 'Error al aprobar');
                }
            } catch (error) {
                alert('Error de conexión');
            }
        }
        
        function abrirRechazo(id) {
            currentRejectId = id;
            document.getElementById('rejectMotivo').value = '';
            document.getElementById('rejectModal').classList.add('active');
        }
        
        function closeRejectModal() {
            document.getElementById('rejectModal').classList.remove('active');
            currentRejectId = null;
        }
        
        async function rechazarIngeniero() {
            const motivo = document.getElementById('rejectMotivo').value.trim();
            
            if (!motivo) {
                alert('Por favor, ingresa un motivo de rechazo');
                return;
            }
            
            const token = localStorage.getItem('pixcapp_token');
            
            try {
                const response = await fetch(`${API}/admin/validaciones.php`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ 
                        id: currentRejectId, 
                        accion: 'rechazar', 
                        motivo: motivo 
                    })
                });
                const data = await response.json();
                
                if (data.success) {
                    closeRejectModal();
                    loadValidaciones();
                } else {
                    alert(data.message || 'Error al rechazar');
                }
            } catch (error) {
                alert('Error de conexión');
            }
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleDateString('es-MX');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
        
        // Event listeners
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('confirmRejectBtn').addEventListener('click', rechazarIngeniero);
        
        document.getElementById('sidebarToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('collapsed');
            document.getElementById('mainContent').classList.toggle('expanded');
        });
        
        updateConnection();
        window.addEventListener('online', updateConnection);
        window.addEventListener('offline', updateConnection);
        
        (async() => {
            if (await checkAuth()) {
                loadValidaciones();
            }
        })();
    </script>
</body>
</html>
