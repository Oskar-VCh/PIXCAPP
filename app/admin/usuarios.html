<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#2E7D32">
    <title>Usuarios - Admin PIXCAPP</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color-primary: #2E7D32;
            --color-primary-light: #4CAF50;
            --color-primary-dark: #1B5E20;
            --color-background: #F5F7FA;
            --color-surface: #FFFFFF;
            --color-text-primary: #1A202C;
            --color-text-secondary: #2D3748;
            --color-text-muted: #4A5568;
            --color-border: #E2E8F0;
            --color-success: #38A169;
            --color-warning: #ED8936;
            --color-error: #E53E3E;
            --color-info: #3182CE;
            --sidebar-width: 260px;
            --header-height: 60px;
            --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.5rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-full: 9999px;
            --transition: all 0.25s ease;
        }
        
        [data-theme="dark"] {
            --color-primary: #66BB6A;
            --color-primary-light: #81C784;
            --color-primary-dark: #388E3C;
            --color-background: #0F172A;
            --color-surface: #1E293B;
            --color-text-primary: #F8FAFC;
            --color-text-secondary: #E2E8F0;
            --color-text-muted: #94A3B8;
            --color-border: #334155;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-background);
            color: var(--color-text-primary);
            min-height: 100vh;
            transition: var(--transition);
        }
        
        .app-container { display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--color-surface);
            border-right: 1px solid var(--color-border);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 200;
            transition: transform 0.3s ease;
            transform: translateX(0);
            display: flex;
            flex-direction: column;
        }
        .sidebar.collapsed { transform: translateX(-100%); }
        
        .sidebar-header {
            padding: var(--spacing-lg);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }
        .sidebar-logo { height: 36px; width: auto; }
        body:not([data-theme="dark"]) .sidebar-logo { filter: brightness(0) invert(0); }
        [data-theme="dark"] .sidebar-logo { filter: brightness(0) invert(1); }
        .sidebar-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--color-primary);
        }
        
        .sidebar-user {
            padding: var(--spacing-lg);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }
        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-full);
            background: var(--color-primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            overflow: hidden;
        }
        .user-name { font-weight: 600; font-size: 0.9375rem; }
        .user-role {
            font-size: 0.75rem;
            color: var(--color-text-muted);
            text-transform: uppercase;
        }
        
        .sidebar-nav {
            flex: 1;
            padding: var(--spacing-md);
            overflow-y: auto;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            padding: var(--spacing-md);
            color: var(--color-text-secondary);
            text-decoration: none;
            border-radius: var(--radius-md);
            transition: var(--transition);
            margin-bottom: 2px;
            font-size: 0.9375rem;
        }
        .nav-item i { width: 22px; font-size: 1.1rem; text-align: center; }
        .nav-item:hover {
            background: var(--color-background);
            color: var(--color-primary);
        }
        .nav-item.active {
            background: var(--color-primary);
            color: white;
        }
        
        .sidebar-footer {
            padding: var(--spacing-lg);
            border-top: 1px solid var(--color-border);
        }
        .connection-status {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: 0.8125rem;
            color: var(--color-text-muted);
            margin-bottom: var(--spacing-md);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-success);
        }
        .status-dot.offline { background: var(--color-error); }
        
        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            transition: margin-left 0.3s ease;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .main-content.expanded { margin-left: 0; }
        
        /* Header */
        .header {
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            padding: 0 var(--spacing-xl);
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: var(--header-height);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .header-left { display: flex; align-items: center; gap: var(--spacing-md); }
        .sidebar-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.35rem;
            color: var(--color-text-primary);
            cursor: pointer;
            padding: var(--spacing-sm);
        }
        .page-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--color-text-primary);
        }
        
        /* Content */
        .content {
            flex: 1;
            padding: var(--spacing-xl);
        }
        
        .toolbar {
            display: flex;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
            flex-wrap: wrap;
            align-items: center;
        }
        
        .search-box {
            position: relative;
            flex: 1;
            min-width: 250px;
        }
        .search-box input {
            width: 100%;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            color: var(--color-text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
        }
        .search-box input:focus { outline: none; border-color: var(--color-primary); }
        .search-box i {
            position: absolute;
            left: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-text-muted);
        }
        
        select.filter {
            padding: 0.6rem 1rem;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            color: var(--color-text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
        }
        
        .btn {
            padding: 0.6rem 1.25rem;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            transition: var(--transition);
        }
        .btn-primary {
            background: var(--color-primary);
            color: white;
        }
        .btn-primary:hover {
            background: var(--color-primary-dark);
            transform: translateY(-1px);
        }
        .btn-sm {
            padding: 0.3rem 0.7rem;
            font-size: 0.75rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--color-text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-sm:hover { border-color: var(--color-primary); color: var(--color-primary); }
        .btn-sm.danger:hover { border-color: var(--color-error); color: var(--color-error); }
        
        .card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .data-table th, .data-table td {
            padding: var(--spacing-sm) var(--spacing-md);
            text-align: left;
            border-bottom: 1px solid var(--color-border);
        }
        .data-table th {
            color: var(--color-text-muted);
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            background: rgba(0,0,0,0.02);
        }
        tr:hover { background: rgba(0,0,0,0.02); }
        [data-theme="dark"] tr:hover { background: rgba(255,255,255,0.02); }
        
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: var(--radius-full);
            font-size: 0.7rem;
            font-weight: 600;
        }
        .badge-green { background: rgba(46,125,32,0.1); color: var(--color-primary); }
        .badge-blue { background: rgba(49,130,206,0.1); color: var(--color-info); }
        .badge-yellow { background: rgba(237,137,54,0.1); color: var(--color-warning); }
        .badge-red { background: rgba(229,62,62,0.1); color: var(--color-error); }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-md);
            margin-top: var(--spacing-md);
        }
        .pagination button {
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--color-text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }
        .pagination button.active {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
        }
        .pagination button:hover:not(.active) {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }
        
        .empty-state {
            text-align: center;
            padding: var(--spacing-xl);
            color: var(--color-text-muted);
        }
        
        .loading-state {
            text-align: center;
            padding: var(--spacing-xl);
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--color-border);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto var(--spacing-md);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .offline-banner {
            background: var(--color-warning);
            color: white;
            padding: var(--spacing-sm) var(--spacing-xl);
            text-align: center;
            font-size: 0.8rem;
            display: none;
        }
        .offline-banner.show { display: block; }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            width: 90%;
            max-width: 550px;
            border: 1px solid var(--color-border);
        }
        .modal h2 {
            margin-bottom: var(--spacing-lg);
            font-size: 1.2rem;
            font-weight: 600;
        }
        .form-group { margin-bottom: var(--spacing-md); }
        .form-label {
            display: block;
            margin-bottom: var(--spacing-xs);
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--color-text-muted);
            text-transform: uppercase;
        }
        .form-input {
            width: 100%;
            padding: 0.6rem;
            background: var(--color-background);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            color: var(--color-text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
        }
        .form-input:focus { outline: none; border-color: var(--color-primary); }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
        }
        .modal-actions {
            display: flex;
            gap: var(--spacing-md);
            justify-content: flex-end;
            margin-top: var(--spacing-lg);
        }
        
        @media (max-width: 768px) {
            .sidebar { display: none !important; }
            .sidebar-toggle { display: none !important; }
            .main-content { margin-left: 0 !important; }
            .header { padding: 0 var(--spacing-md); }
            .content { padding: var(--spacing-md); }
            .toolbar { flex-direction: column; }
            .search-box { width: 100%; }
            select.filter { width: 100%; }
            .data-table { font-size: 0.7rem; }
            .data-table th, .data-table td { padding: var(--spacing-xs) var(--spacing-sm); }
            .form-row { grid-template-columns: 1fr; }
        }
        
        @media (min-width: 769px) {
            .sidebar-toggle { display: flex; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="../../assets/img/logo.png" alt="PIXCAPP" class="sidebar-logo" onerror="this.src='https://placehold.co/36x36/2E7D32/white?text=P'">
                <span class="sidebar-title">PIXCAPP Admin</span>
            </div>
            <div class="sidebar-user">
                <div class="user-avatar" id="userAvatar"><i class="fas fa-user-shield"></i></div>
                <div class="user-info">
                    <div class="user-name" id="sidebarUserName">Cargando...</div>
                    <div class="user-role">Administrador</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="usuarios.html" class="nav-item active"><i class="fas fa-users"></i> Usuarios</a>
                <a href="validaciones.html" class="nav-item"><i class="fas fa-check-circle"></i> Validaciones</a>
                <a href="parcelas.html" class="nav-item"><i class="fas fa-seedling"></i> Parcelas</a>
                <a href="asignaciones.html" class="nav-item"><i class="fas fa-link"></i> Asignaciones</a>
                <a href="taxonomia.html" class="nav-item"><i class="fas fa-book"></i> Taxonomía</a>
                <a href="logs.html" class="nav-item"><i class="fas fa-history"></i> Logs</a>
                <a href="ajustes.html" class="nav-item"><i class="fas fa-cog"></i> Ajustes</a>
            </nav>
            <div class="sidebar-footer">
                <div class="connection-status">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">En línea</span>
                </div>
                <button class="nav-item" id="logoutBtn" style="width:100%;margin-top:var(--spacing-md);border:none;background:none;cursor:pointer;">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </div>
        </aside>
        
        <main class="main-content" id="mainContent">
            <div class="offline-banner" id="offlineBanner"><i class="fas fa-wifi-slash"></i> Modo sin conexión</div>
            
            <header class="header">
                <div class="header-left">
                    <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
                    <h1 class="page-title">Gestión de Usuarios</h1>
                </div>
            </header>
            
            <div class="content">
                <div class="toolbar">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Buscar por nombre o teléfono...">
                    </div>
                    <select class="filter" id="filterRol">
                        <option value="">Todos los roles</option>
                        <option value="agricultor">Agricultor</option>
                        <option value="ingeniero">Ingeniero</option>
                        <option value="admin">Admin</option>
                    </select>
                    <select class="filter" id="filterEstado">
                        <option value="">Todos los estados</option>
                        <option value="activo">Activo</option>
                        <option value="pendiente">Pendiente</option>
                        <option value="suspendido">Suspendido</option>
                    </select>
                    <button class="btn btn-primary" onclick="openModal()">
                        <i class="fas fa-plus"></i> Nuevo Usuario
                    </button>
                </div>
                
                <div class="card">
                    <table class="data-table">
                        <thead>
                            <tr><th>ID</th><th>Nombre</th><th>Teléfono</th><th>Rol</th><th>Estado</th><th>Registro</th><th>Acciones</th></tr>
                        </thead>
                        <tbody id="usersTable">
                            <tr><td colspan="7" style="text-align:center; padding: 2rem; color: var(--color-text-muted);">
                                <div class="loading-spinner" style="width:30px;height:30px;"></div> Cargando...
                            </td></tr>
                        </tbody>
                    </table>
                </div>
                
                <div class="pagination" id="pagination"></div>
            </div>
        </main>
    </div>
    
    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 id="modalTitle">Nuevo Usuario</h2>
            <form id="userForm">
                <input type="hidden" id="userId">
                <div class="form-group">
                    <label class="form-label">Nombre completo</label>
                    <input type="text" id="userNombre" class="form-input" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Teléfono</label>
                        <input type="text" id="userTelefono" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email" id="userCorreo" class="form-input">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Rol</label>
                        <select id="userRol" class="form-input">
                            <option value="agricultor">Agricultor</option>
                            <option value="ingeniero">Ingeniero</option>
                            <option value="admin">Administrador</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Estado</label>
                        <select id="userEstado" class="form-input">
                            <option value="activo">Activo</option>
                            <option value="pendiente">Pendiente</option>
                            <option value="suspendido">Suspendido</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Contraseña <span style="font-weight:normal; color:var(--color-text-muted);">(dejar vacío para no cambiar)</span></label>
                    <input type="password" id="userPassword" class="form-input" placeholder="••••••••">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-sm" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn-primary" style="padding:0.6rem 1.25rem; border:none; border-radius:var(--radius-md); font-weight:600; background:var(--color-primary); color:white; cursor:pointer;">
                        <i class="fas fa-save"></i> Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        // Tema
        (function(){ 
            const theme = localStorage.getItem('theme') || 'light'; 
            document.body.setAttribute('data-theme', theme); 
        })();
        
        const API = '../../api';
        let currentUser = null;
        let allUsers = [];
        let currentPage = 1;
        const perPage = 15;
        
        function updateConnection() {
            const isOnline = navigator.onLine;
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const offlineBanner = document.getElementById('offlineBanner');
            if (statusDot) statusDot.className = 'status-dot' + (isOnline ? '' : ' offline');
            if (statusText) statusText.textContent = isOnline ? 'En línea' : 'Sin conexión';
            if (offlineBanner) offlineBanner.classList.toggle('show', !isOnline);
        }
        
        async function checkAuth() {
            const token = localStorage.getItem('pixcapp_token');
            const user = JSON.parse(localStorage.getItem('pixcapp_user') || '{}');
            if (!token || !user.id || user.rol !== 'admin') {
                window.location.href = 'index.html';
                return false;
            }
            currentUser = user;
            document.getElementById('sidebarUserName').textContent = user.nombre || 'Admin';
            return true;
        }
        
        async function loadUsers() {
            const token = localStorage.getItem('pixcapp_token');
            const search = document.getElementById('searchInput').value;
            const rol = document.getElementById('filterRol').value;
            const estado = document.getElementById('filterEstado').value;
            
            const tbody = document.getElementById('usersTable');
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:2rem;"><div class="loading-spinner" style="width:30px;height:30px;"></div> Cargando...</td></tr>';
            
            try {
                const url = `${API}/admin/usuarios.php?page=${currentPage}&perPage=${perPage}&search=${encodeURIComponent(search)}&rol=${rol}&estado=${estado}`;
                const response = await fetch(url, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await response.json();
                
                if (data.success) {
                    allUsers = data.users;
                    renderUsers();
                    renderPagination(data.total);
                } else {
                    throw new Error(data.message);
                }
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:2rem; color:var(--color-error);">Error: ${error.message}</td></tr>`;
            }
        }
        
        function renderUsers() {
            const tbody = document.getElementById('usersTable');
            
            if (!allUsers || allUsers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:2rem; color:var(--color-text-muted);">No hay usuarios registrados</td></tr>';
                return;
            }
            
            const roleClass = { agricultor: 'badge-green', ingeniero: 'badge-blue', admin: 'badge-yellow' };
            const estadoClass = { activo: 'badge-green', pendiente: 'badge-yellow', suspendido: 'badge-red' };
            const estadoIcon = { activo: 'check', pendiente: 'clock', suspendido: 'ban' };
            
            tbody.innerHTML = allUsers.map(user => `
                <tr>
                    <td>${user.id}</td>
                    <td>${escapeHtml(user.nombre)}</td>
                    <td>${user.telefono || '-'}</td>
                    <td><span class="badge ${roleClass[user.rol] || 'badge-green'}">${user.rol === 'agricultor' ? 'Agricultor' : (user.rol === 'ingeniero' ? 'Ingeniero' : 'Admin')}</span></td>
                    <td><span class="badge ${estadoClass[user.estado] || 'badge-yellow'}">${user.estado}</span></td>
                    <td>${formatDate(user.fecha_registro)}</td>
                    <td>
                        <button class="btn-sm" onclick="editUser(${user.id})" title="Editar"><i class="fas fa-edit"></i></button>
                        <button class="btn-sm ${user.estado === 'activo' ? 'danger' : ''}" onclick="toggleUserState(${user.id}, '${user.estado}')" title="${user.estado === 'activo' ? 'Suspender' : 'Activar'}">
                            <i class="fas fa-${user.estado === 'activo' ? 'ban' : 'check-circle'}"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        
        function renderPagination(total) {
            const pagination = document.getElementById('pagination');
            const totalPages = Math.ceil(total / perPage);
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            pagination.innerHTML = html;
        }
        
        function goToPage(page) {
            currentPage = page;
            loadUsers();
        }
        
        async function editUser(id) {
            const user = allUsers.find(u => u.id === id);
            if (!user) return;
            
            document.getElementById('modalTitle').textContent = 'Editar Usuario';
            document.getElementById('userId').value = user.id;
            document.getElementById('userNombre').value = user.nombre;
            document.getElementById('userTelefono').value = user.telefono || '';
            document.getElementById('userCorreo').value = user.correo || '';
            document.getElementById('userRol').value = user.rol;
            document.getElementById('userEstado').value = user.estado;
            document.getElementById('userPassword').value = '';
            document.getElementById('modalOverlay').classList.add('active');
        }
        
        function openModal() {
            document.getElementById('modalTitle').textContent = 'Nuevo Usuario';
            document.getElementById('userId').value = '';
            document.getElementById('userNombre').value = '';
            document.getElementById('userTelefono').value = '';
            document.getElementById('userCorreo').value = '';
            document.getElementById('userRol').value = 'agricultor';
            document.getElementById('userEstado').value = 'activo';
            document.getElementById('userPassword').value = '';
            document.getElementById('modalOverlay').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }
        
        async function toggleUserState(id, currentState) {
            const newState = currentState === 'activo' ? 'suspendido' : 'activo';
            const action = newState === 'activo' ? 'activar' : 'suspender';
            
            if (!confirm(`¿${action} este usuario?`)) return;
            
            const token = localStorage.getItem('pixcapp_token');
            
            try {
                const response = await fetch(`${API}/admin/usuarios.php`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ id, estado: newState })
                });
                const data = await response.json();
                
                if (data.success) {
                    loadUsers();
                } else {
                    alert(data.message || 'Error al cambiar estado');
                }
            } catch (error) {
                alert('Error de conexión');
            }
        }
        
        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const token = localStorage.getItem('pixcapp_token');
            const userId = document.getElementById('userId').value;
            const data = {
                nombre: document.getElementById('userNombre').value,
                telefono: document.getElementById('userTelefono').value,
                correo: document.getElementById('userCorreo').value,
                rol: document.getElementById('userRol').value,
                estado: document.getElementById('userEstado').value
            };
            
            const password = document.getElementById('userPassword').value;
            if (password) data.password = password;
            
            const method = userId ? 'PUT' : 'POST';
            if (userId) data.id = parseInt(userId);
            
            try {
                const response = await fetch(`${API}/admin/usuarios.php`, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                
                if (result.success) {
                    closeModal();
                    loadUsers();
                } else {
                    alert(result.message || 'Error al guardar');
                }
            } catch (error) {
                alert('Error de conexión');
            }
        });
        
        document.getElementById('searchInput').addEventListener('input', () => { currentPage = 1; loadUsers(); });
        document.getElementById('filterRol').addEventListener('change', () => { currentPage = 1; loadUsers(); });
        document.getElementById('filterEstado').addEventListener('change', () => { currentPage = 1; loadUsers(); });
        
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleDateString('es-MX');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
        
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('sidebarToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('collapsed');
            document.getElementById('mainContent').classList.toggle('expanded');
        });
        
        updateConnection();
        window.addEventListener('online', updateConnection);
        window.addEventListener('offline', updateConnection);
        
        (async() => {
            if (await checkAuth()) {
                loadUsers();
            }
        })();
    </script>
</body>
</html>
