<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#2E7D32">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Reportar Plaga - PIXCAPP</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color-primary: #2E7D32; --color-primary-light: #4CAF50; --color-primary-dark: #1B5E20;
            --color-background: #F5F7FA; --color-surface: #FFFFFF;
            --color-text-primary: #1A202C; --color-text-secondary: #2D3748; --color-text-muted: #4A5568;
            --color-border: #E2E8F0; --color-error: #E53E3E; --color-success: #38A169; --color-warning: #ED8936; --color-info: #3182CE;
            --sidebar-width: 260px; --header-height: 56px;
            --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
            --spacing-xs: 0.25rem; --spacing-sm: 0.5rem; --spacing-md: 1rem; --spacing-lg: 1.5rem; --spacing-xl: 2rem;
            --radius-md: 0.5rem; --radius-lg: 0.75rem; --radius-xl: 1rem; --radius-full: 9999px;
            --transition: all 0.2s ease;
        }
        
        [data-theme="dark"] {
            --color-primary: #66BB6A; --color-primary-light: #81C784; --color-primary-dark: #388E3C;
            --color-background: #0F172A; --color-surface: #1E293B;
            --color-text-primary: #F8FAFC; --color-text-secondary: #E2E8F0; --color-text-muted: #CBD5E1;
            --color-border: #334155;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--color-background); color: var(--color-text-primary); min-height: 100vh; transition: var(--transition); }
        .app-container { display: flex; min-height: 100vh; }
        
        /* SIDEBAR DESKTOP */
        .sidebar { width: var(--sidebar-width); background: var(--color-surface); border-right: 1px solid var(--color-border); position: fixed; top: 0; left: 0; bottom: 0; z-index: 200; transition: transform 0.3s ease; transform: translateX(0); display: flex; flex-direction: column; }
        .sidebar.collapsed { transform: translateX(-100%); }
        .sidebar-header { padding: var(--spacing-lg); border-bottom: 1px solid var(--color-border); display: flex; align-items: center; gap: var(--spacing-md); }
        .sidebar-logo { height: 34px; width: auto; transition: filter 0.3s ease; }
        body:not([data-theme="dark"]) .sidebar-logo { filter: brightness(0) invert(0); }
        [data-theme="dark"] .sidebar-logo { filter: brightness(0) invert(1); }
        .sidebar-title { font-size: 1.2rem; font-weight: 700; color: var(--color-primary); }
        .sidebar-user { padding: var(--spacing-lg); border-bottom: 1px solid var(--color-border); display: flex; align-items: center; gap: var(--spacing-md); }
        .user-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--color-primary-light); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; overflow: hidden; }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-name { font-weight: 600; font-size: 0.9rem; } .user-role { font-size: 0.7rem; color: var(--color-text-muted); text-transform: uppercase; }
        .sidebar-nav { flex: 1; padding: var(--spacing-md); overflow-y: auto; }
        .nav-item { display: flex; align-items: center; gap: var(--spacing-md); padding: var(--spacing-sm) var(--spacing-md); color: var(--color-text-secondary); text-decoration: none; border-radius: var(--radius-md); transition: var(--transition); margin-bottom: 2px; font-size: 0.9rem; }
        .nav-item i { width: 20px; font-size: 1.05rem; text-align: center; }
        .nav-item:hover { background: var(--color-background); color: var(--color-primary); }
        .sidebar-footer { padding: var(--spacing-lg); border-top: 1px solid var(--color-border); }
        
        /* MAIN */
        .main-content { flex: 1; margin-left: var(--sidebar-width); transition: margin-left 0.3s ease; display: flex; flex-direction: column; min-height: 100vh; }
        .main-content.expanded { margin-left: 0; }
        
        /* HEADER */
        .header { background: var(--color-surface); border-bottom: 1px solid var(--color-border); padding: 0 var(--spacing-xl); display: flex; align-items: center; height: var(--header-height); position: sticky; top: 0; z-index: 50; }
        .header-left { display: flex; align-items: center; gap: var(--spacing-md); flex: 1; }
        .sidebar-toggle { display: none; background: none; border: none; font-size: 1.3rem; color: var(--color-text-primary); cursor: pointer; padding: var(--spacing-sm); }
        .back-btn { display: flex; align-items: center; gap: var(--spacing-sm); color: var(--color-text-secondary); text-decoration: none; font-weight: 500; font-size: 0.9rem; }
        .back-btn:hover { color: var(--color-primary); }
        .mobile-logo { display: none; align-items: center; gap: var(--spacing-sm); }
        .mobile-logo-img { height: 28px; width: auto; transition: filter 0.3s ease; }
        body:not([data-theme="dark"]) .mobile-logo-img { filter: brightness(0) invert(0); }
        [data-theme="dark"] .mobile-logo-img { filter: brightness(0) invert(1); }
        .mobile-logo-text { font-size: 1.05rem; font-weight: 700; color: var(--color-primary); }
        .page-title { font-size: 1.2rem; font-weight: 700; }
        
        /* CONTENT */
        .content { flex: 1; padding: var(--spacing-xl); }
        .content-wrapper { max-width: 600px; margin: 0 auto; }
        
        .form-card { background: var(--color-surface); border-radius: var(--radius-xl); border: 1px solid var(--color-border); padding: var(--spacing-xl); margin-bottom: var(--spacing-xl); }
        .section-title { font-size: 1rem; font-weight: 600; margin-bottom: var(--spacing-lg); display: flex; align-items: center; gap: var(--spacing-sm); }
        .section-title i { color: var(--color-primary); }
        .form-group { margin-bottom: var(--spacing-lg); }
        .form-label { display: flex; align-items: center; gap: var(--spacing-sm); font-weight: 500; color: var(--color-text-secondary); margin-bottom: var(--spacing-sm); font-size: 0.85rem; }
        .form-label i { color: var(--color-primary); width: 16px; }
        .form-label .required { color: var(--color-error); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-lg); }
        .input-wrapper { position: relative; }
        .input-icon { position: absolute; left: var(--spacing-md); top: 50%; transform: translateY(-50%); color: var(--color-text-muted); z-index: 1; }
        .form-input { width: 100%; padding: 0.7rem var(--spacing-md) 0.7rem 2.5rem; font-size: 0.9rem; font-family: 'Inter', sans-serif; color: var(--color-text-primary); background: var(--color-background); border: 2px solid var(--color-border); border-radius: var(--radius-md); transition: var(--transition); }
        .form-input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(46,125,50,0.1); }
        .form-input.error { border-color: var(--color-error); }
        select.form-input { cursor: pointer; } textarea.form-input { resize: vertical; min-height: 80px; }
        .error-message { color: var(--color-error); font-size: 0.75rem; margin-top: var(--spacing-xs); }
        
        /* Severidad */
        .severity-options { display: flex; gap: var(--spacing-md); }
        .severity-btn { flex: 1; padding: var(--spacing-md); background: var(--color-background); border: 2px solid var(--color-border); border-radius: var(--radius-md); text-align: center; cursor: pointer; transition: var(--transition); font-family: 'Inter', sans-serif; }
        .severity-btn i { font-size: 1.5rem; margin-bottom: var(--spacing-xs); display: block; }
        .severity-btn span { font-size: 0.85rem; font-weight: 500; }
        .severity-btn:hover { border-color: var(--color-primary); }
        .severity-btn.selected { border-color: var(--color-primary); background: rgba(46,125,50,0.08); }
        .severity-btn.selected[data-value="Leve"] { border-color: var(--color-info); background: rgba(49,130,206,0.08); }
        .severity-btn.selected[data-value="Moderado"] { border-color: var(--color-warning); background: rgba(237,137,54,0.08); }
        .severity-btn.selected[data-value="Severo"] { border-color: var(--color-error); background: rgba(229,62,62,0.08); }
        
        /* Notificar */
        .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: var(--spacing-md) 0; }
        .toggle-label { font-weight: 500; color: var(--color-text-secondary); font-size: 0.9rem; display: flex; align-items: center; gap: var(--spacing-sm); }
        .toggle-label i { color: var(--color-primary); width: 18px; }
        .toggle-switch { position: relative; width: 50px; height: 28px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; inset: 0; background: var(--color-border); border-radius: 28px; transition: var(--transition); }
        .toggle-slider::before { content: ''; position: absolute; height: 22px; width: 22px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: var(--transition); }
        .toggle-switch input:checked+.toggle-slider { background: var(--color-primary); }
        .toggle-switch input:checked+.toggle-slider::before { transform: translateX(22px); }
        
        .photo-preview { width: 100%; max-height: 200px; border-radius: var(--radius-md); background: var(--color-background); border: 2px dashed var(--color-border); display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; margin-top: var(--spacing-sm); min-height: 60px; }
        .photo-preview img { width: 100%; height: auto; max-height: 200px; object-fit: cover; }
        .photo-preview i { font-size: 1.5rem; color: var(--color-text-muted); }
        
        .form-actions { display: flex; justify-content: flex-end; gap: var(--spacing-md); padding-top: var(--spacing-lg); border-top: 1px solid var(--color-border); }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: var(--spacing-sm); padding: 0.65rem 1.5rem; font-size: 0.9rem; font-weight: 600; border: none; border-radius: var(--radius-md); cursor: pointer; transition: var(--transition); min-width: 120px; }
        .btn-primary { background: var(--color-primary); color: white; } .btn-primary:hover { background: var(--color-primary-dark); } .btn-primary:disabled { opacity: 0.6; }
        .btn-secondary { background: transparent; color: var(--color-text-secondary); border: 1px solid var(--color-border); } .btn-secondary:hover { background: var(--color-background); }
        
        .alert { padding: var(--spacing-md); border-radius: var(--radius-md); margin-bottom: var(--spacing-lg); display: flex; align-items: center; gap: var(--spacing-md); font-size: 0.85rem; }
        .alert-error { background: rgba(229,62,62,0.1); border: 1px solid var(--color-error); color: var(--color-error); }
        .alert-success { background: rgba(56,161,105,0.1); border: 1px solid var(--color-success); color: var(--color-success); }
        
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 768px) {
            .sidebar { display: none !important; } .sidebar-toggle { display: none !important; }
            .main-content { margin-left: 0 !important; }
            .header { padding: 0 var(--spacing-md); }
            .mobile-logo { display: flex; } .page-title { display: none; }
            .content { padding: var(--spacing-md); } .form-card { padding: var(--spacing-lg); }
            .form-row { grid-template-columns: 1fr; gap: var(--spacing-md); }
            .severity-options { flex-direction: column; }
            .form-actions { flex-direction: column; } .btn { width: 100%; }
            .back-btn span { display: none; }
        }
        
        @media (min-width: 769px) {
            .sidebar-toggle { display: flex; } .mobile-logo { display: none; } .page-title { display: block; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><img src="../../assets/img/logo.png" alt="PIXCAPP" class="sidebar-logo"><span class="sidebar-title">PIXCAPP</span></div>
            <div class="sidebar-user"><div class="user-avatar" id="userAvatar"><i class="fas fa-user"></i></div><div class="user-info"><div class="user-name" id="sidebarUserName">Cargando...</div><div class="user-role">Agricultor</div></div></div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="cultivos.html" class="nav-item"><i class="fas fa-seedling"></i> Mis Cultivos</a>
                <a href="reportes.html" class="nav-item"><i class="fas fa-chart-bar"></i> Reportes</a>
                <a href="guia.html" class="nav-item"><i class="fas fa-book"></i> Guía de Cultivos</a>
                <a href="ingeniero.html" class="nav-item"><i class="fas fa-user-tie"></i> Mi Ingeniero</a>
                <a href="configuracion.html" class="nav-item"><i class="fas fa-cog"></i> Configuración</a>
            </nav>
            <div class="sidebar-footer"><button class="nav-item" id="logoutBtn" style="width:100%;border:none;background:none;cursor:pointer;font-family:Inter,sans-serif;text-align:left;"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button></div>
        </aside>
        
        <main class="main-content" id="mainContent">
            <header class="header">
                <div class="header-left">
                    <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
                    <a href="cultivos".html" class="back-btn"><i class="fas fa-arrow-left"></i> <span>Volver</span></a>
                    <div class="mobile-logo"><img src="../../assets/img/logo.png" alt="PIXCAPP" class="mobile-logo-img"><span class="mobile-logo-text">PIXCAPP</span></div>
                    <h1 class="page-title">Reportar Plaga</h1>
                </div>
            </header>
            
            <div class="content">
                <div class="content-wrapper">
                    <div id="alertContainer"></div>
                    
                    <form id="plagaForm">
                        <div class="form-card">
                            <h2 class="section-title"><i class="fas fa-bug"></i> Información de la Plaga</h2>
                            
                            <div class="form-group">
                                <label class="form-label" for="parcela_id"><i class="fas fa-seedling"></i> Parcela afectada <span class="required">*</span></label>
                                <div class="input-wrapper"><i class="fas fa-map-marker-alt input-icon"></i><select id="parcela_id" class="form-input" required><option value="">Selecciona una parcela</option></select></div>
                                <div class="error-message" id="parcelaError"></div>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label"><i class="fas fa-exclamation-triangle"></i> Nivel de severidad <span class="required">*</span></label>
                                <div class="severity-options" id="severityOptions">
                                    <button type="button" class="severity-btn" data-value="Leve"><i class="fas fa-check-circle" style="color:var(--color-info);"></i><span>Leve</span></button>
                                    <button type="button" class="severity-btn" data-value="Moderado"><i class="fas fa-exclamation-circle" style="color:var(--color-warning);"></i><span>Moderado</span></button>
                                    <button type="button" class="severity-btn" data-value="Severo"><i class="fas fa-times-circle" style="color:var(--color-error);"></i><span>Severo</span></button>
                                </div>
                                <input type="hidden" id="severidad" value="">
                                <div class="error-message" id="severidadError"></div>
                            </div>
                            
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label" for="parte_afectada"><i class="fas fa-leaf"></i> Parte afectada</label>
                                    <div class="input-wrapper"><i class="fas fa-seedling input-icon"></i><select id="parte_afectada" class="form-input"><option value="">Selecciona</option><option value="Hoja">Hoja</option><option value="Tallo">Tallo</option><option value="Fruto">Fruto</option><option value="Raíz">Raíz</option><option value="Cogollo">Cogollo</option><option value="Flor">Flor</option><option value="General">General</option></select></div>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="sintoma"><i class="fas fa-search"></i> Síntoma</label>
                                    <div class="input-wrapper"><i class="fas fa-clipboard-list input-icon"></i><select id="sintoma" class="form-input"><option value="">Selecciona</option><option value="Manchas">Manchas</option><option value="Marchitez">Marchitez</option><option value="Insectos">Insectos visibles</option><option value="Decoloración">Decoloración</option><option value="Deformación">Deformación</option><option value="Pudrición">Pudrición</option><option value="Otro">Otro</option></select></div>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label" for="descripcion"><i class="fas fa-pen"></i> Descripción <span class="required">*</span></label>
                                <textarea id="descripcion" class="form-input" rows="3" placeholder="Describe lo que observas en el cultivo..." required></textarea>
                                <div class="error-message" id="descripcionError"></div>
                            </div>
                        </div>
                        
                        <div class="form-card">
                            <h2 class="section-title"><i class="fas fa-camera"></i> Fotos (obligatorio)</h2>
                            <div class="photo-preview" id="photoPreview1" onclick="document.getElementById('foto1').click()"><i class="fas fa-camera"></i><span style="margin-left:0.5rem;color:var(--color-text-muted);">Foto principal *</span></div>
                            <input type="file" id="foto1" accept="image/*" capture="environment" style="display:none;">
                            <div class="photo-preview" id="photoPreview2" onclick="document.getElementById('foto2').click()" style="margin-top:var(--spacing-sm);"><i class="fas fa-plus"></i><span style="margin-left:0.5rem;color:var(--color-text-muted);">Foto adicional (opcional)</span></div>
                            <input type="file" id="foto2" accept="image/*" capture="environment" style="display:none;">
                            <div class="error-message" id="fotoError"></div>
                        </div>
                        
                        <div class="form-card">
                            <h2 class="section-title"><i class="fas fa-bell"></i> Notificaciones</h2>
                            <div class="toggle-row">
                                <label class="toggle-label"><i class="fas fa-user-tie"></i> Notificar a mi ingeniero</label>
                                <label class="toggle-switch"><input type="checkbox" id="notificar" checked><span class="toggle-slider"></span></label>
                            </div>
                        </div>
                        
                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" onclick="history.back()"><i class="fas fa-times"></i> Cancelar</button>
                            <button type="submit" class="btn btn-primary" id="submitBtn"><i class="fas fa-exclamation-triangle"></i> Reportar Plaga</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        // TEMA GLOBAL
        (function(){ document.body.setAttribute('data-theme',localStorage.getItem('theme')||'light'); })();
        window.addEventListener('storage',(e)=>{ if(e.key==='theme') document.body.setAttribute('data-theme',e.newValue||'light'); });
        
        const API='../../api'; let currentUser=null, foto1Base64=null, foto2Base64=null;
        const urlParams=new URLSearchParams(window.location.search);
        const parcelaPreseleccionada=urlParams.get('parcela');
        
        async function checkAuth(){
            const t=localStorage.getItem('pixcapp_token'), u=JSON.parse(localStorage.getItem('pixcapp_user')||'{}');
            if(!t||!u.id){ window.location.href='../../login.html'; return false; }
            try{
                const r=await fetch(`${API}/auth/verify.php`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+t}});
                const d=await r.json();
                if(!d.valid||u.rol!=='agricultor'){ localStorage.clear(); window.location.href='../../login.html'; return false; }
                currentUser=d.user||u; return true;
            }catch(e){ return true; }
        }
        
        async function init(){
            if(!await checkAuth()) return;
            if(currentUser){
                document.getElementById('sidebarUserName').textContent=currentUser.nombre;
                const a=document.getElementById('userAvatar'), ini=currentUser.nombre.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
                a.innerHTML=currentUser.foto_perfil?`<img src="../../${currentUser.foto_perfil}">`:ini;
            }
            document.getElementById('sidebarToggle').addEventListener('click',()=>{ document.getElementById('sidebar').classList.toggle('collapsed'); document.getElementById('mainContent').classList.toggle('expanded'); });
            document.getElementById('logoutBtn').addEventListener('click',async()=>{ const t=localStorage.getItem('pixcapp_token'); if(t) try{ await fetch(`${API}/auth/logout.php`,{method:'POST',headers:{'Authorization':'Bearer '+t}}); }catch(e){} localStorage.clear(); window.location.href='../../login.html'; });
            
            // Severidad
            document.querySelectorAll('.severity-btn').forEach(b=>{ b.addEventListener('click',()=>{ document.querySelectorAll('.severity-btn').forEach(x=>x.classList.remove('selected')); b.classList.add('selected'); document.getElementById('severidad').value=b.dataset.value; document.getElementById('severidadError').textContent=''; }); });
            
            // Fotos
            setupPhotoUpload('foto1','photoPreview1',1);
            setupPhotoUpload('foto2','photoPreview2',2);
            
            await loadParcelas();
        }
        
        function setupPhotoUpload(inputId, previewId, num){
            const fi=document.getElementById(inputId), pp=document.getElementById(previewId);
            fi.addEventListener('change',(e)=>{ const f=e.target.files[0]; if(f){ if(f.size>5242880){ showAlert('Máximo 5MB','error'); return; } const r=new FileReader(); r.onload=(ev)=>{ pp.innerHTML=`<img src="${ev.target.result}" alt="Foto ${num}">`; if(num===1) foto1Base64=ev.target.result; else foto2Base64=ev.target.result; }; r.readAsDataURL(f); } });
        }
        
        async function loadParcelas(){
            const s=document.getElementById('parcela_id'), token=localStorage.getItem('pixcapp_token');
            try{
                const r=await fetch(`${API}/parcelas/listar.php`,{headers:{'Authorization':'Bearer '+token}});
                const d=await r.json();
                if(d.success&&d.parcelas) d.parcelas.forEach(p=>{ const o=document.createElement('option'); o.value=p.id; o.textContent=p.nombre; if(parcelaPreseleccionada&&p.id==parcelaPreseleccionada) o.selected=true; s.appendChild(o); });
            }catch(e){
                const cc=JSON.parse(localStorage.getItem('pixcapp_cultivos')||'[]');
                cc.forEach(p=>{ const o=document.createElement('option'); o.value=p.id; o.textContent=p.nombre; if(parcelaPreseleccionada&&p.id==parcelaPreseleccionada) o.selected=true; s.appendChild(o); });
            }
        }
        
        function showAlert(m,t='error'){ const c=document.getElementById('alertContainer'), i=t==='error'?'fa-exclamation-circle':'fa-check-circle'; c.innerHTML=`<div class="alert alert-${t}"><i class="fas ${i}"></i><span>${m}</span></div>`; if(t!=='error') setTimeout(()=>c.innerHTML='',4000); }
        
        // Submit
        document.getElementById('plagaForm').addEventListener('submit',async(e)=>{
            e.preventDefault();
            const parcela=document.getElementById('parcela_id').value, severidad=document.getElementById('severidad').value, descripcion=document.getElementById('descripcion').value.trim();
            let ok=true;
            if(!parcela){ document.getElementById('parcelaError').textContent='Selecciona una parcela'; ok=false; } else document.getElementById('parcelaError').textContent='';
            if(!severidad){ document.getElementById('severidadError').textContent='Selecciona severidad'; ok=false; } else document.getElementById('severidadError').textContent='';
            if(!descripcion){ document.getElementById('descripcionError').textContent='Describe el problema'; ok=false; } else document.getElementById('descripcionError').textContent='';
            if(!foto1Base64){ document.getElementById('fotoError').textContent='La foto principal es obligatoria'; ok=false; } else document.getElementById('fotoError').textContent='';
            if(!ok) return;
            
            const token=localStorage.getItem('pixcapp_token'), btn=document.getElementById('submitBtn'), orig=btn.innerHTML;
            btn.innerHTML='<span class="spinner"></span> Reportando...'; btn.disabled=true;
            
            const datos={severidad,parte_afectada:document.getElementById('parte_afectada').value,sintoma:document.getElementById('sintoma').value,descripcion,notificar:document.getElementById('notificar').checked};
            const fd={parcela_id:parcela,tipo:'plaga',datos:JSON.stringify(datos),foto1:foto1Base64,foto2:foto2Base64};
            
            try{
                const r=await fetch(`${API}/eventos/registrar.php`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(fd)});
                const d=await r.json();
                if(d.success){ showAlert('¡Plaga reportada! Se notificará al ingeniero.','success'); setTimeout(()=>history.back(),2000); }
                else { showAlert(d.message||'Error','error'); btn.innerHTML=orig; btn.disabled=false; }
            }catch(er){
                if(!navigator.onLine){ const sq=JSON.parse(localStorage.getItem('pixcapp_sync_queue')||'[]'); sq.push({tipo:'plaga',descripcion:`Plaga - ${severidad}`,datos:fd,fecha:new Date().toISOString()}); localStorage.setItem('pixcapp_sync_queue',JSON.stringify(sq)); showAlert('Guardado localmente','success'); setTimeout(()=>history.back(),1500); }
                else { showAlert('Error de conexión','error'); btn.innerHTML=orig; btn.disabled=false; }
            }
        });
        
        init();
    </script>
</body>
</html>
