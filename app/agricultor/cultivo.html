<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#2E7D32">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Ficha de Cultivo - PIXCAPP</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color-primary: #2E7D32;
            --color-primary-light: #4CAF50;
            --color-primary-dark: #1B5E20;
            --color-primary-soft: #E8F5E9;
            --color-background: #F5F7FA;
            --color-surface: #FFFFFF;
            --color-text-primary: #1A202C;
            --color-text-secondary: #2D3748;
            --color-text-muted: #4A5568;
            --color-border: #E2E8F0;
            --color-error: #E53E3E;
            --color-success: #38A169;
            --color-warning: #ED8936;
            --color-info: #3182CE;
            --sidebar-width: 260px;
            --header-height: 60px;
            --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.5rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-full: 9999px;
            --transition: all 0.25s ease;
        }
        
        [data-theme="dark"] {
            --color-primary: #66BB6A;
            --color-primary-light: #81C784;
            --color-primary-dark: #388E3C;
            --color-primary-soft: #1B2E1F;
            --color-background: #0F172A;
            --color-surface: #1E293B;
            --color-text-primary: #F8FAFC;
            --color-text-secondary: #E2E8F0;
            --color-text-muted: #94A3B8;
            --color-border: #334155;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-background);
            color: var(--color-text-primary);
            min-height: 100vh;
            transition: var(--transition);
        }
        
        .app-container { display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--color-surface);
            border-right: 1px solid var(--color-border);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 200;
            transition: transform 0.3s ease;
            transform: translateX(0);
            display: flex;
            flex-direction: column;
        }
        .sidebar.collapsed { transform: translateX(-100%); }
        
        .sidebar-header {
            padding: var(--spacing-lg);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }
        .sidebar-logo { height: 36px; width: auto; }
        body:not([data-theme="dark"]) .sidebar-logo { filter: brightness(0) invert(0); }
        [data-theme="dark"] .sidebar-logo { filter: brightness(0) invert(1); }
        .sidebar-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--color-primary);
        }
        
        .sidebar-user {
            padding: var(--spacing-lg);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }
        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-full);
            background: var(--color-primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            overflow: hidden;
        }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-name { font-weight: 600; font-size: 0.9375rem; }
        .user-role {
            font-size: 0.75rem;
            color: var(--color-text-muted);
            text-transform: uppercase;
        }
        
        .sidebar-nav {
            flex: 1;
            padding: var(--spacing-md);
            overflow-y: auto;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            padding: var(--spacing-md);
            color: var(--color-text-secondary);
            text-decoration: none;
            border-radius: var(--radius-md);
            transition: var(--transition);
            margin-bottom: 2px;
            font-size: 0.9375rem;
        }
        .nav-item i { width: 22px; font-size: 1.1rem; text-align: center; }
        .nav-item:hover {
            background: var(--color-background);
            color: var(--color-primary);
        }
        .nav-item.active {
            background: var(--color-primary);
            color: white;
        }
        
        .sidebar-footer {
            padding: var(--spacing-lg);
            border-top: 1px solid var(--color-border);
        }
        .connection-status {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: 0.8125rem;
            color: var(--color-text-muted);
            margin-bottom: var(--spacing-md);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-success);
        }
        .status-dot.offline { background: var(--color-error); }
        
        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            transition: margin-left 0.3s ease;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .main-content.expanded { margin-left: 0; }
        
        /* Header */
        .header {
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            padding: 0 var(--spacing-xl);
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: var(--header-height);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .header-left { display: flex; align-items: center; gap: var(--spacing-md); }
        .sidebar-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.35rem;
            color: var(--color-text-primary);
            cursor: pointer;
            padding: var(--spacing-sm);
        }
        .mobile-logo {
            display: none;
            align-items: center;
            gap: var(--spacing-sm);
        }
        .mobile-logo-img { height: 32px; width: auto; }
        body:not([data-theme="dark"]) .mobile-logo-img { filter: brightness(0) invert(0); }
        [data-theme="dark"] .mobile-logo-img { filter: brightness(0) invert(1); }
        .mobile-logo-text {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--color-primary);
        }
        .page-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--color-text-primary);
        }
        
        .back-btn {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            color: var(--color-text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: var(--transition);
        }
        .back-btn:hover { color: var(--color-primary); }
        
        /* Contenido */
        .content {
            flex: 1;
            padding: var(--spacing-xl);
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* Cabecera del cultivo */
        .cultivo-header {
            display: flex;
            gap: var(--spacing-xl);
            margin-bottom: var(--spacing-xl);
            flex-wrap: wrap;
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            padding: var(--spacing-xl);
        }
        
        .cultivo-image-container {
            position: relative;
            width: 200px;
            height: 200px;
            flex-shrink: 0;
        }
        
        .cultivo-image {
            width: 100%;
            height: 100%;
            border-radius: var(--radius-xl);
            background-size: cover;
            background-position: center;
            background-color: var(--color-background);
            border: 2px solid var(--color-border);
        }
        
        .edit-image-btn {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: var(--color-primary);
            border: none;
            border-radius: var(--radius-full);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .edit-image-btn:hover {
            background: var(--color-primary-dark);
            transform: scale(1.05);
        }
        
        .cultivo-info {
            flex: 1;
            min-width: 280px;
        }
        
        .cultivo-title {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-sm);
            flex-wrap: wrap;
        }
        
        .cultivo-title h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--color-text-primary);
        }
        
        .edit-name-btn {
            background: none;
            border: none;
            color: var(--color-text-muted);
            cursor: pointer;
            font-size: 1rem;
            padding: var(--spacing-xs);
            transition: var(--transition);
        }
        
        .edit-name-btn:hover { color: var(--color-primary); }
        
        .cultivo-status {
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
            background: var(--color-success);
            color: white;
        }
        
        .cultivo-status.warning { background: var(--color-warning); }
        
        .cultivo-meta {
            display: flex;
            gap: var(--spacing-xl);
            margin-bottom: var(--spacing-md);
            color: var(--color-text-secondary);
            flex-wrap: wrap;
        }
        
        .cultivo-meta span {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: 0.875rem;
        }
        
        .cultivo-meta i { color: var(--color-primary); width: 18px; }
        
        .cultivo-actions {
            display: flex;
            gap: var(--spacing-sm);
            flex-wrap: wrap;
            margin-top: var(--spacing-md);
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            font-weight: 500;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }
        
        .btn-primary {
            background: var(--color-primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--color-primary-dark);
            transform: translateY(-1px);
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--color-border);
            color: var(--color-text-secondary);
        }
        
        .btn-outline:hover {
            background: var(--color-background);
            border-color: var(--color-primary);
            color: var(--color-primary);
        }
        
        .btn-danger {
            background: transparent;
            border: 1px solid var(--color-error);
            color: var(--color-error);
        }
        
        .btn-danger:hover {
            background: var(--color-error);
            color: white;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: var(--spacing-xs);
            border-bottom: 2px solid var(--color-border);
            margin-bottom: var(--spacing-xl);
            overflow-x: auto;
        }
        
        .tab {
            padding: var(--spacing-sm) var(--spacing-lg);
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--color-text-muted);
            background: none;
            border: none;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: var(--transition);
            white-space: nowrap;
        }
        
        .tab:hover { color: var(--color-primary); }
        .tab.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
        }
        
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Cards */
        .card {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            padding: var(--spacing-xl);
            margin-bottom: var(--spacing-xl);
        }
        
        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: var(--spacing-lg);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        
        .card-title i { color: var(--color-primary); }
        
        /* Info grid */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: var(--spacing-lg);
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
        }
        
        .info-label {
            font-size: 0.7rem;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .info-value {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--color-text-primary);
        }
        
        /* Timeline */
        .timeline {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }
        
        .timeline-item {
            display: flex;
            gap: var(--spacing-md);
            padding: var(--spacing-md);
            background: var(--color-background);
            border-radius: var(--radius-md);
        }
        
        .timeline-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-full);
            background: var(--color-primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            flex-shrink: 0;
        }
        
        .timeline-content { flex: 1; }
        .timeline-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: var(--spacing-xs);
            flex-wrap: wrap;
            gap: var(--spacing-sm);
        }
        .timeline-title { font-weight: 600; font-size: 0.85rem; }
        .timeline-date { font-size: 0.7rem; color: var(--color-text-muted); }
        .timeline-desc { font-size: 0.8rem; color: var(--color-text-secondary); }
        
        /* Galería */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: var(--spacing-md);
        }
        
        .gallery-item {
            aspect-ratio: 1;
            border-radius: var(--radius-md);
            background-size: cover;
            background-position: center;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid var(--color-border);
        }
        
        .gallery-item:hover {
            transform: scale(1.05);
            border-color: var(--color-primary);
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content { max-width: 90%; max-height: 90%; }
        .modal-content img { max-width: 100%; max-height: 90vh; border-radius: var(--radius-lg); }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }
        
        /* Modal de edición */
        .edit-modal {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            max-width: 500px;
            width: 90%;
        }
        
        .edit-modal h3 {
            font-size: 1.2rem;
            margin-bottom: var(--spacing-lg);
        }
        
        .edit-modal input, .edit-modal select, .edit-modal textarea {
            width: 100%;
            padding: 0.7rem;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            color: var(--color-text-primary);
            background: var(--color-background);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-md);
        }
        
        .edit-modal input:focus, .edit-modal select:focus, .edit-modal textarea:focus {
            outline: none;
            border-color: var(--color-primary);
        }
        
        .edit-actions {
            display: flex;
            gap: var(--spacing-md);
            justify-content: flex-end;
            margin-top: var(--spacing-lg);
        }
        
        .chart-container {
            height: 300px;
            margin-bottom: var(--spacing-xl);
        }
        
        .loading {
            text-align: center;
            padding: var(--spacing-xl);
        }
        
        .offline-banner {
            background: var(--color-warning);
            color: white;
            padding: var(--spacing-sm) var(--spacing-xl);
            text-align: center;
            font-size: 0.8rem;
            display: none;
        }
        .offline-banner.show { display: block; }
        
        /* Bottom Nav Mobile */
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65px;
            background: var(--color-surface);
            border-top: 1px solid var(--color-border);
            z-index: 100;
        }
        .bottom-nav-items {
            display: flex;
            align-items: center;
            justify-content: space-around;
            height: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            color: var(--color-text-muted);
            text-decoration: none;
            font-size: 0.65rem;
        }
        .bottom-nav-item i { font-size: 1.1rem; }
        .bottom-nav-item.active { color: var(--color-primary); }
        .fab-button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--color-primary);
            color: white;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            margin-top: -24px;
        }
        
        @media (max-width: 768px) {
            .sidebar { display: none !important; }
            .sidebar-toggle { display: none !important; }
            .main-content { margin-left: 0 !important; padding-bottom: 65px; }
            .header { padding: 0 var(--spacing-md); }
            .mobile-logo { display: flex; }
            .page-title { display: none; }
            .content { padding: var(--spacing-md); }
            .bottom-nav { display: block; }
            .cultivo-header { flex-direction: column; align-items: center; text-align: center; }
            .cultivo-image-container { width: 150px; height: 150px; }
            .cultivo-meta { justify-content: center; }
            .cultivo-actions { justify-content: center; }
            .info-grid { grid-template-columns: 1fr; }
        }
        
        @media (min-width: 769px) {
            .sidebar-toggle { display: flex; }
            .mobile-logo { display: none; }
            .page-title { display: block; }
            .bottom-nav { display: none !important; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="../../assets/img/logo.png" alt="PIXCAPP" class="sidebar-logo" onerror="this.src='https://placehold.co/36x36/2E7D32/white?text=P'">
                <span class="sidebar-title">PIXCAPP</span>
            </div>
            <div class="sidebar-user">
                <div class="user-avatar" id="userAvatar"><i class="fas fa-user"></i></div>
                <div class="user-info">
                    <div class="user-name" id="sidebarUserName">Cargando...</div>
                    <div class="user-role">Agricultor</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="cultivos.html" class="nav-item"><i class="fas fa-seedling"></i> Mis Cultivos</a>
                <a href="reportes.html" class="nav-item"><i class="fas fa-chart-bar"></i> Reportes</a>
                <a href="guia.html" class="nav-item"><i class="fas fa-book"></i> Guía de Cultivos</a>
                <a href="ingeniero.html" class="nav-item"><i class="fas fa-user-tie"></i> Mi Ingeniero</a>
                <a href="ajustes.html" class="nav-item"><i class="fas fa-cog"></i> Ajustes</a>
            </nav>
            <div class="sidebar-footer">
                <div class="connection-status">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">En línea</span>
                </div>
                <button class="nav-item" id="logoutBtn" style="width:100%;margin-top:var(--spacing-md);border:none;background:none;cursor:pointer;">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </div>
        </aside>
        
        <main class="main-content" id="mainContent">
            <div class="offline-banner" id="offlineBanner"><i class="fas fa-wifi-slash"></i> Modo sin conexión</div>
            
            <header class="header">
                <div class="header-left">
                    <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
                    <div class="mobile-logo">
                        <img src="../../assets/img/logo.png" alt="PIXCAPP" class="mobile-logo-img">
                        <span class="mobile-logo-text">PIXCAPP</span>
                    </div>
                    <a href="cultivos.html" class="back-btn" id="backBtn">
                        <i class="fas fa-arrow-left"></i> <span>Mis Cultivos</span>
                    </a>
                </div>
            </header>
            
            <div class="content">
                <div id="loadingMessage" class="loading"><i class="fas fa-spinner fa-spin"></i> Cargando información...</div>
                <div id="cultivoContent" style="display: none;"></div>
            </div>
        </main>
    </div>
    
    <!-- Bottom Nav Mobile -->
    <nav class="bottom-nav" id="bottomNav">
        <div class="bottom-nav-items">
            <a href="dashboard.html" class="bottom-nav-item"><i class="fas fa-home"></i><span>Inicio</span></a>
            <a href="cultivos.html" class="bottom-nav-item"><i class="fas fa-seedling"></i><span>Cultivos</span></a>
            <button class="fab-button" id="fabButton"><i class="fas fa-plus"></i></button>
            <a href="reportes.html" class="bottom-nav-item"><i class="fas fa-chart-bar"></i><span>Reportes</span></a>
            <a href="perfil.html" class="bottom-nav-item"><i class="fas fa-user"></i><span>Perfil</span></a>
        </div>
    </nav>
    
    <div class="fab-menu" id="fabMenu" style="display:none; position:fixed; bottom:80px; right:20px; flex-direction:column; gap:10px; z-index:200;">
        <button class="fab-menu-item" onclick="location.href='registro-riego.html'"><i class="fas fa-tint"></i> Riego</button>
        <button class="fab-menu-item" onclick="location.href='registro-plaga.html'"><i class="fas fa-bug"></i> Plaga</button>
        <button class="fab-menu-item" onclick="location.href='registro-fertilizacion.html'"><i class="fas fa-flask"></i> Fertilización</button>
        <button class="fab-menu-item" onclick="location.href='tomar-foto.html'"><i class="fas fa-camera"></i> Foto</button>
    </div>
    
    <!-- Modal de fotos -->
    <div class="modal" id="photoModal">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <div class="modal-content"><img id="modalImage" src="" alt="Foto"></div>
    </div>
    
    <!-- Modal de edición -->
    <div class="modal" id="editModal">
        <div class="edit-modal">
            <h3 id="editModalTitle">Editar Parcela</h3>
            <input type="text" id="editNombre" placeholder="Nombre de la parcela">
            <select id="editCultivo">
                <option value="1">Maíz</option>
                <option value="2">Frijol</option>
                <option value="3">Tomate</option>
            </select>
            <input type="text" id="editVariedad" placeholder="Variedad">
            <input type="date" id="editFechaSiembra">
            <textarea id="editNotas" rows="3" placeholder="Notas adicionales"></textarea>
            <div class="edit-actions">
                <button class="btn btn-outline" onclick="closeEditModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="saveParcelaChanges()">Guardar</button>
            </div>
        </div>
    </div>
    
    <script>
        // ============================================
        // TEMA
        // ============================================
        (function(){ 
            const theme = localStorage.getItem('theme') || 'light'; 
            document.body.setAttribute('data-theme', theme); 
        })();
        
        window.addEventListener('storage', (e) => { 
            if(e.key === 'theme') document.body.setAttribute('data-theme', e.newValue || 'light'); 
        });
        
        // ============================================
        // VARIABLES
        // ============================================
        const API = '../../api';
        let currentUser = null;
        let parcelaId = null;
        let parcelaData = null;
        let alturaChart = null;
        
        // Obtener ID de la URL
        const urlParams = new URLSearchParams(window.location.search);
        parcelaId = urlParams.get('id');
        
        // ============================================
        // CONEXIÓN
        // ============================================
        function updateConnection() {
            const isOnline = navigator.onLine;
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const offlineBanner = document.getElementById('offlineBanner');
            
            if (statusDot) {
                statusDot.className = 'status-dot' + (isOnline ? '' : ' offline');
            }
            if (statusText) {
                statusText.textContent = isOnline ? 'En línea' : 'Sin conexión';
            }
            if (offlineBanner) {
                offlineBanner.classList.toggle('show', !isOnline);
            }
        }
        
        // ============================================
        // AUTH
        // ============================================
        async function checkAuth() {
            const token = localStorage.getItem('pixcapp_token');
            const user = JSON.parse(localStorage.getItem('pixcapp_user') || '{}');
            
            if (!token || !user.id) {
                window.location.href = '../../login.html';
                return false;
            }
            
            try {
                const response = await fetch(`${API}/auth/verify.php`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    }
                });
                const data = await response.json();
                
                if (!data.valid) {
                    clearSession();
                    window.location.href = '../../login.html';
                    return false;
                }
                
                currentUser = data.user || user;
                return true;
            } catch (error) {
                if (!navigator.onLine) {
                    currentUser = user;
                    return true;
                }
                return false;
            }
        }
        
        function clearSession() {
            localStorage.removeItem('pixcapp_token');
            localStorage.removeItem('pixcapp_user');
        }
        
        // ============================================
        // CARGAR DATOS
        // ============================================
        async function loadParcelaData() {
            if (!parcelaId) {
                window.location.href = 'cultivos.html';
                return;
            }
            
            const token = localStorage.getItem('pixcapp_token');
            
            try {
                const response = await fetch(`${API}/parcelas/detalle.php?id=${parcelaId}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await response.json();
                
                if (data.success) {
                    parcelaData = data.parcela;
                    renderParcelaData();
                    renderTimeline(data.eventos || []);
                    renderGallery(data.fotos || []);
                    renderChart(data.mediciones || []);
                    localStorage.setItem(`pixcapp_parcela_${parcelaId}`, JSON.stringify({ parcela: parcelaData, eventos: data.eventos, fotos: data.fotos }));
                } else {
                    loadCachedData();
                }
            } catch (error) {
                loadCachedData();
            } finally {
                document.getElementById('loadingMessage').style.display = 'none';
                document.getElementById('cultivoContent').style.display = 'block';
            }
        }
        
        function loadCachedData() {
            const cached = localStorage.getItem(`pixcapp_parcela_${parcelaId}`);
            if (cached) {
                const data = JSON.parse(cached);
                parcelaData = data.parcela;
                renderParcelaData();
                renderTimeline(data.eventos || []);
                renderGallery(data.fotos || []);
            } else {
                document.getElementById('cultivoContent').innerHTML = `
                    <div class="card" style="text-align:center; padding:2rem;">
                        <i class="fas fa-exclamation-triangle" style="font-size:3rem; color:var(--color-error);"></i>
                        <h3>Error al cargar la parcela</h3>
                        <p>No se pudo cargar la información de la parcela.</p>
                        <a href="cultivos.html" class="btn btn-primary" style="margin-top:1rem;">Volver a Mis Cultivos</a>
                    </div>
                `;
            }
        }
        
        // ============================================
        // RENDER PRINCIPAL
        // ============================================
        function renderParcelaData() {
            const container = document.getElementById('cultivoContent');
            const iniciales = parcelaData.nombre.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
            const fotoUrl = parcelaData.foto_principal ? `../../${parcelaData.foto_principal}` : null;
            const estadoClass = parcelaData.estado === 'atencion' ? 'warning' : '';
            const estadoText = parcelaData.estado === 'saludable' ? 'Saludable' : 'Atención';
            
            container.innerHTML = `
                <!-- Cabecera -->
                <div class="cultivo-header">
                    <div class="cultivo-image-container">
                        <div class="cultivo-image" id="cultivoImage" style="background-image: url('${fotoUrl || '../../assets/img/placeholder-cultivo.jpg'}');"></div>
                        <button class="edit-image-btn" onclick="openImageUploader()"><i class="fas fa-camera"></i></button>
                    </div>
                    <div class="cultivo-info">
                        <div class="cultivo-title">
                            <h1 id="cultivoNombre">${escapeHtml(parcelaData.nombre)}</h1>
                            <button class="edit-name-btn" onclick="openEditModal()"><i class="fas fa-pen"></i></button>
                            <span class="cultivo-status ${estadoClass}">${estadoText}</span>
                        </div>
                        <div class="cultivo-meta">
                            <span><i class="fas fa-seedling"></i> ${escapeHtml(parcelaData.cultivo_nombre || 'Maíz')} - ${escapeHtml(parcelaData.variedad || 'Blanco Criollo')}</span>
                            <span><i class="fas fa-calendar"></i> Día ${parcelaData.dias_desde_siembra || '-'}</span>
                            <span><i class="fas fa-map-marker-alt"></i> ${parseFloat(parcelaData.latitud).toFixed(4)}°, ${parseFloat(parcelaData.longitud).toFixed(4)}°</span>
                        </div>
                        <div class="cultivo-actions">
                            <a href="registro-riego.html?parcela=${parcelaId}" class="btn btn-primary"><i class="fas fa-tint"></i> Regar</a>
                            <a href="registro-plaga.html?parcela=${parcelaId}" class="btn btn-outline"><i class="fas fa-bug"></i> Plaga</a>
                            <a href="registro-fertilizacion.html?parcela=${parcelaId}" class="btn btn-outline"><i class="fas fa-flask"></i> Fertilizar</a>
                            <a href="tomar-foto.html?parcela=${parcelaId}" class="btn btn-outline"><i class="fas fa-camera"></i> Foto</a>
                            <button class="btn btn-danger" onclick="confirmDeleteParcela()"><i class="fas fa-trash-alt"></i> Eliminar</button>
                        </div>
                    </div>
                </div>
                
                <!-- Pestañas -->
                <div class="tabs">
                    <button class="tab active" data-tab="datos">📋 Datos</button>
                    <button class="tab" data-tab="historial">📜 Historial</button>
                    <button class="tab" data-tab="crecimiento">📈 Crecimiento</button>
                </div>
                
                <!-- Tab Datos -->
                <div class="tab-content active" id="tab-datos">
                    <div class="card">
                        <h2 class="card-title"><i class="fas fa-info-circle"></i> Información General</h2>
                        <div class="info-grid" id="datosGenerales"></div>
                    </div>
                    <div class="card">
                        <h2 class="card-title"><i class="fas fa-leaf"></i> Clasificación Taxonómica</h2>
                        <div class="info-grid" id="taxonomia"></div>
                    </div>
                    <div class="card">
                        <h2 class="card-title"><i class="fas fa-thermometer-half"></i> Requerimientos</h2>
                        <div class="info-grid" id="requerimientos"></div>
                    </div>
                </div>
                
                <!-- Tab Historial -->
                <div class="tab-content" id="tab-historial">
                    <div class="card">
                        <h2 class="card-title"><i class="fas fa-history"></i> Línea de Tiempo</h2>
                        <div class="timeline" id="timeline"></div>
                    </div>
                    <div class="card">
                        <h2 class="card-title"><i class="fas fa-images"></i> Galería</h2>
                        <div class="gallery" id="gallery"></div>
                    </div>
                </div>
                
                <!-- Tab Crecimiento -->
                <div class="tab-content" id="tab-crecimiento">
                    <div class="card">
                        <h2 class="card-title"><i class="fas fa-chart-line"></i> Evolución de Altura</h2>
                        <div class="chart-container"><canvas id="alturaChart"></canvas></div>
                    </div>
                    <div class="card">
                        <h2 class="card-title"><i class="fas fa-calendar-alt"></i> Etapa Fenológica</h2>
                        <div id="etapaFenologica"></div>
                    </div>
                </div>
            `;
            
            // Llenar datos
            document.getElementById('datosGenerales').innerHTML = `
                <div class="info-item"><span class="info-label">Nombre</span><span class="info-value">${escapeHtml(parcelaData.nombre)}</span></div>
                <div class="info-item"><span class="info-label">Cultivo</span><span class="info-value">${escapeHtml(parcelaData.cultivo_nombre || 'Maíz')}</span></div>
                <div class="info-item"><span class="info-label">Variedad</span><span class="info-value">${escapeHtml(parcelaData.variedad || 'Blanco Criollo')}</span></div>
                <div class="info-item"><span class="info-label">Siembra</span><span class="info-value">${formatDate(parcelaData.fecha_siembra)}</span></div>
                <div class="info-item"><span class="info-label">Días</span><span class="info-value">${parcelaData.dias_desde_siembra || '-'} días</span></div>
                <div class="info-item"><span class="info-label">Área</span><span class="info-value">${parcelaData.area_m2 ? parcelaData.area_m2 + ' m²' : '-'}</span></div>
            `;
            
            document.getElementById('taxonomia').innerHTML = `
                <div class="info-item"><span class="info-label">Reino</span><span class="info-value">Plantae</span></div>
                <div class="info-item"><span class="info-label">Familia</span><span class="info-value">Poaceae</span></div>
                <div class="info-item"><span class="info-label">Género</span><span class="info-value">Zea</span></div>
                <div class="info-item"><span class="info-label">Especie</span><span class="info-value">Zea mays</span></div>
            `;
            
            document.getElementById('requerimientos').innerHTML = `
                <div class="info-item"><span class="info-label">pH</span><span class="info-value">5.5 - 7.0</span></div>
                <div class="info-item"><span class="info-label">Temperatura</span><span class="info-value">18°C - 32°C</span></div>
                <div class="info-item"><span class="info-label">Altitud</span><span class="info-value">0 - 2,500 msnm</span></div>
                <div class="info-item"><span class="info-label">Precipitación</span><span class="info-value">500 - 800 mm</span></div>
            `;
            
            // Etapa fenológica
            const dias = parcelaData.dias_desde_siembra || 0;
            let etapa = 'VE (Emergencia)', progreso = 10;
            if (dias > 7) { etapa = 'V6 (6 hojas)'; progreso = 25; }
            if (dias > 25) { etapa = 'V12 (12 hojas)'; progreso = 45; }
            if (dias > 40) { etapa = 'VT (Floración)'; progreso = 60; }
            if (dias > 60) { etapa = 'R1 (Jiloteo)'; progreso = 75; }
            if (dias > 90) { etapa = 'R5 (Dentado)'; progreso = 90; }
            if (dias > 100) { etapa = 'R6 (Madurez)'; progreso = 100; }
            
            document.getElementById('etapaFenologica').innerHTML = `
                <p style="margin-bottom:1rem;"><strong>Etapa actual:</strong> ${etapa}</p>
                <div style="background:var(--color-border); height:8px; border-radius:999px;"><div style="width:${progreso}%; background:var(--color-primary); height:8px; border-radius:999px;"></div></div>
                <div style="display:flex; justify-content:space-between; margin-top:0.5rem; font-size:0.7rem; color:var(--color-text-muted);"><span>VE</span><span>V6</span><span>V12</span><span>VT</span><span>R1</span><span>R5</span><span>R6</span></div>
                <p style="margin-top:1rem;"><i class="fas fa-hourglass-half"></i> Días a cosecha: ${Math.max(0, 120 - dias)} días</p>
            `;
            
            setupTabs();
        }
        
        function renderTimeline(eventos) {
            const timeline = document.getElementById('timeline');
            if (!eventos || eventos.length === 0) {
                timeline.innerHTML = '<p style="text-align:center; color:var(--color-text-muted);">Sin eventos registrados</p>';
                return;
            }
            const iconos = { riego: 'tint', plaga: 'bug', fertilizacion: 'flask', foto: 'camera', medicion: 'ruler' };
            timeline.innerHTML = eventos.slice(0, 20).map(e => `
                <div class="timeline-item">
                    <div class="timeline-icon"><i class="fas fa-${iconos[e.tipo] || 'circle'}"></i></div>
                    <div class="timeline-content">
                        <div class="timeline-header"><span class="timeline-title">${getTituloEvento(e)}</span><span class="timeline-date">${formatDateTime(e.fecha_evento)}</span></div>
                        <div class="timeline-desc">${getDescEvento(e)}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderGallery(fotos) {
            const gallery = document.getElementById('gallery');
            if (!fotos || fotos.length === 0) {
                gallery.innerHTML = '<p style="text-align:center; color:var(--color-text-muted); grid-column:1/-1;">Sin fotos registradas</p>';
                return;
            }
            gallery.innerHTML = fotos.map(f => `<div class="gallery-item" style="background-image:url('../../${f.url}');" onclick="openModal('../../${f.url}')"></div>`).join('');
        }
        
        function renderChart(mediciones) {
            const ctx = document.getElementById('alturaChart')?.getContext('2d');
            if (!ctx) return;
            if (alturaChart) alturaChart.destroy();
            const labels = [], data = [];
            mediciones.filter(m => m.tipo === 'altura').forEach(m => { labels.push(formatDate(m.fecha)); data.push(parseFloat(m.valor) || 0); });
            if (labels.length === 0) { labels.push('Siembra'); data.push(0.1); }
            alturaChart = new Chart(ctx, { type: 'line', data: { labels, datasets: [{ label: 'Altura (m)', data, borderColor: '#2E7D32', backgroundColor: 'rgba(46,125,50,0.1)', tension: 0.4, fill: true }] }, options: { responsive: true, maintainAspectRatio: false } });
        }
        
        function getTituloEvento(e) {
            const t = { riego: '💧 Riego', plaga: '⚠️ Plaga', fertilizacion: '🌱 Fertilización', foto: '📸 Foto' };
            return t[e.tipo] || 'Evento';
        }
        
        function getDescEvento(e) {
            try {
                const d = JSON.parse(e.datos || '{}');
                if (e.tipo === 'riego') return `Cantidad: ${d.cantidad || '-'} L`;
                if (e.tipo === 'plaga') return `Severidad: ${d.severidad || '-'}`;
                if (e.tipo === 'fertilizacion') return `Producto: ${d.producto || '-'}`;
                return d.descripcion || '-';
            } catch { return '-'; }
        }
        
        function setupTabs() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
                });
            });
        }
        
        // ============================================
        // ACCIONES
        // ============================================
        function openEditModal() {
            document.getElementById('editNombre').value = parcelaData.nombre;
            document.getElementById('editVariedad').value = parcelaData.variedad || '';
            document.getElementById('editFechaSiembra').value = parcelaData.fecha_siembra || '';
            document.getElementById('editNotas').value = parcelaData.notas || '';
            document.getElementById('editModal').classList.add('active');
        }
        
        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }
        
        async function saveParcelaChanges() {
            const token = localStorage.getItem('pixcapp_token');
            const data = {
                nombre: document.getElementById('editNombre').value,
                variedad: document.getElementById('editVariedad').value,
                fecha_siembra: document.getElementById('editFechaSiembra').value,
                notas: document.getElementById('editNotas').value
            };
            
            try {
                const response = await fetch(`${API}/parcelas/actualizar.php?id=${parcelaId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (result.success) {
                    alert('Parcela actualizada correctamente');
                    closeEditModal();
                    loadParcelaData();
                } else {
                    alert(result.message || 'Error al actualizar');
                }
            } catch (error) {
                alert('Error de conexión');
            }
        }
        
        function confirmDeleteParcela() {
            if (confirm('¿Eliminar esta parcela? Esta acción no se puede deshacer.')) {
                deleteParcela();
            }
        }
        
        async function deleteParcela() {
            const token = localStorage.getItem('pixcapp_token');
            try {
                const response = await fetch(`${API}/parcelas/eliminar.php?id=${parcelaId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const result = await response.json();
                if (result.success) {
                    alert('Parcela eliminada');
                    window.location.href = 'cultivos.html';
                } else {
                    alert(result.message || 'Error al eliminar');
                }
            } catch (error) {
                alert('Error de conexión');
            }
        }
        
        function openImageUploader() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const formData = new FormData();
                formData.append('foto', file);
                formData.append('parcela_id', parcelaId);
                const token = localStorage.getItem('pixcapp_token');
                try {
                    const response = await fetch(`${API}/parcelas/subir-foto.php`, {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + token },
                        body: formData
                    });
                    const result = await response.json();
                    if (result.success) {
                        alert('Foto actualizada');
                        loadParcelaData();
                    } else {
                        alert(result.message || 'Error al subir foto');
                    }
                } catch (error) {
                    alert('Error de conexión');
                }
            };
            input.click();
        }
        
        function openModal(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('photoModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('photoModal').classList.remove('active');
        }
        
        // ============================================
        // UTILIDADES
        // ============================================
        function formatDate(f) { if (!f) return '-'; return new Date(f).toLocaleDateString('es-MX'); }
        function formatDateTime(f) { if (!f) return '-'; return new Date(f).toLocaleString('es-MX'); }
        function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        
        function setupFabMenu() {
            const fab = document.getElementById('fabButton'), menu = document.getElementById('fabMenu');
            if (fab && menu) {
                fab.addEventListener('click', (e) => { e.stopPropagation(); menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex'; });
                document.addEventListener('click', (e) => { if (menu && !menu.contains(e.target) && e.target !== fab) menu.style.display = 'none'; });
            }
        }
        
        // ============================================
        // INICIO
        // ============================================
        async function init() {
            const auth = await checkAuth();
            if (!auth) return;
            
            if (currentUser) {
                document.getElementById('sidebarUserName').textContent = currentUser.nombre;
                const avatar = document.getElementById('userAvatar');
                const initials = currentUser.nombre.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
                avatar.innerHTML = currentUser.foto_perfil ? `<img src="../../${currentUser.foto_perfil}">` : initials;
            }
            
            document.getElementById('sidebarToggle').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('collapsed');
                document.getElementById('mainContent').classList.toggle('expanded');
            });
            
            document.getElementById('logoutBtn').addEventListener('click', async () => {
                const token = localStorage.getItem('pixcapp_token');
                if (token) try { await fetch(`${API}/auth/logout.php`, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } }); } catch(e) {}
                localStorage.clear();
                window.location.href = '../../login.html';
            });
            
            updateConnection();
            window.addEventListener('online', updateConnection);
            window.addEventListener('offline', updateConnection);
            
            setupFabMenu();
            await loadParcelaData();
        }
        
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.openEditModal = openEditModal;
        window.closeEditModal = closeEditModal;
        window.saveParcelaChanges = saveParcelaChanges;
        window.confirmDeleteParcela = confirmDeleteParcela;
        window.openImageUploader = openImageUploader;
        
        init();
    </script>
    <script src="app/assets/js/pwa-register.js"></script>
</body>
</html>
