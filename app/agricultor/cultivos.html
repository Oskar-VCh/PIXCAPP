<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#2E7D32">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Mis Cultivos - PIXCAPP</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color-primary: #2E7D32; --color-primary-light: #4CAF50; --color-primary-dark: #1B5E20;
            --color-background: #F5F7FA; --color-surface: #FFFFFF;
            --color-text-primary: #1A202C; --color-text-secondary: #2D3748; --color-text-muted: #4A5568;
            --color-border: #E2E8F0; --color-success: #38A169; --color-warning: #ED8936;
            --color-error: #E53E3E; --color-info: #3182CE;
            --sidebar-width: 260px; --header-height: 60px; --bottom-nav-height: 65px;
            --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05); --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --spacing-xs: 0.25rem; --spacing-sm: 0.5rem; --spacing-md: 1rem; --spacing-lg: 1.5rem; --spacing-xl: 2rem;
            --radius-md: 0.5rem; --radius-lg: 0.75rem; --radius-xl: 1rem; --radius-full: 9999px;
            --transition: all 0.25s ease;
        }
        
        [data-theme="dark"] {
            --color-primary: #66BB6A; --color-primary-light: #81C784; --color-primary-dark: #388E3C;
            --color-background: #0F172A; --color-surface: #1E293B;
            --color-text-primary: #F8FAFC; --color-text-secondary: #E2E8F0; --color-text-muted: #CBD5E1;
            --color-border: #334155;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif; background-color: var(--color-background);
            color: var(--color-text-primary); min-height: 100vh; transition: var(--transition);
        }
        
        .app-container { display: flex; min-height: 100vh; }
        
        /* === SIDEBAR (IDÉNTICO AL DASHBOARD) === */
        .sidebar {
            width: var(--sidebar-width); background: var(--color-surface);
            border-right: 1px solid var(--color-border); position: fixed; top: 0; left: 0; bottom: 0;
            z-index: 200; transition: transform 0.3s ease; transform: translateX(0);
            display: flex; flex-direction: column;
        }
        .sidebar.collapsed { transform: translateX(-100%); }
        
        .sidebar-header { padding: var(--spacing-lg); border-bottom: 1px solid var(--color-border); display: flex; align-items: center; gap: var(--spacing-md); }
        .sidebar-logo { height: 36px; width: auto; transition: filter 0.3s ease; }
        body:not([data-theme="dark"]) .sidebar-logo { filter: brightness(0) invert(0); }
        [data-theme="dark"] .sidebar-logo { filter: brightness(0) invert(1); }
        .sidebar-title { font-size: 1.25rem; font-weight: 700; color: var(--color-primary); }
        
        .sidebar-user { padding: var(--spacing-lg); border-bottom: 1px solid var(--color-border); display: flex; align-items: center; gap: var(--spacing-md); }
        .user-avatar { width: 44px; height: 44px; border-radius: var(--radius-full); background: var(--color-primary-light); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; overflow: hidden; }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-name { font-weight: 600; font-size: 0.9375rem; }
        .user-role { font-size: 0.75rem; color: var(--color-text-muted); text-transform: uppercase; }
        
        .sidebar-nav { flex: 1; padding: var(--spacing-md); overflow-y: auto; }
        .nav-item { display: flex; align-items: center; gap: var(--spacing-md); padding: var(--spacing-md); color: var(--color-text-secondary); text-decoration: none; border-radius: var(--radius-md); transition: var(--transition); margin-bottom: 2px; font-size: 0.9375rem; }
        .nav-item i { width: 22px; font-size: 1.1rem; text-align: center; }
        .nav-item:hover { background: var(--color-background); color: var(--color-primary); }
        .nav-item.active { background: var(--color-primary); color: white; }
        
        .sidebar-footer { padding: var(--spacing-lg); border-top: 1px solid var(--color-border); }
        .connection-status { display: flex; align-items: center; gap: var(--spacing-sm); font-size: 0.8125rem; color: var(--color-text-muted); margin-bottom: var(--spacing-md); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--color-success); }
        .status-dot.offline { background: var(--color-error); }
        
        /* === MAIN CONTENT === */
        .main-content { flex: 1; margin-left: var(--sidebar-width); transition: margin-left 0.3s ease; display: flex; flex-direction: column; min-height: 100vh; }
        .main-content.expanded { margin-left: 0; }
        
        /* === HEADER === */
        .header {
            background: var(--color-surface); border-bottom: 1px solid var(--color-border);
            padding: 0 var(--spacing-xl); display: flex; align-items: center; justify-content: space-between;
            height: var(--header-height); position: sticky; top: 0; z-index: 50;
        }
        .header-left { display: flex; align-items: center; gap: var(--spacing-md); }
        .header-right { display: flex; align-items: center; gap: var(--spacing-md); }
        
        .sidebar-toggle { display: none; background: none; border: none; font-size: 1.35rem; color: var(--color-text-primary); cursor: pointer; padding: var(--spacing-sm); }
        
        .mobile-logo { display: none; align-items: center; gap: var(--spacing-sm); }
        .mobile-logo-img { height: 32px; width: auto; transition: filter 0.3s ease; }
        body:not([data-theme="dark"]) .mobile-logo-img { filter: brightness(0) invert(0); }
        [data-theme="dark"] .mobile-logo-img { filter: brightness(0) invert(1); }
        .mobile-logo-text { font-size: 1.125rem; font-weight: 700; color: var(--color-primary); }
        
        .page-title { font-size: 1.25rem; font-weight: 700; color: var(--color-text-primary); }
        
        /* Contenido específico de cultivos */
        .content { flex: 1; padding: var(--spacing-xl); }
        
        .search-bar { position: relative; margin-bottom: var(--spacing-xl); max-width: 400px; }
        .search-bar input { width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem; font-size: 0.875rem; font-family: 'Inter', sans-serif; color: var(--color-text-primary); background: var(--color-surface); border: 2px solid var(--color-border); border-radius: var(--radius-full); transition: var(--transition); }
        .search-bar input:focus { outline: none; border-color: var(--color-primary); }
        .search-bar i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--color-text-muted); }
        
        .cultivos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: var(--spacing-lg); }
        .cultivo-card { background: var(--color-surface); border-radius: var(--radius-lg); border: 1px solid var(--color-border); overflow: hidden; transition: var(--transition); }
        .cultivo-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
        .cultivo-image { height: 160px; background-size: cover; background-position: center; position: relative; background-color: var(--color-background); }
        .cultivo-status { position: absolute; top: var(--spacing-md); right: var(--spacing-md); padding: 4px 12px; border-radius: var(--radius-full); font-size: 0.6875rem; font-weight: 600; background: var(--color-success); color: white; }
        .cultivo-status.warning { background: var(--color-warning); }
        .cultivo-body { padding: var(--spacing-lg); }
        .cultivo-title { display: flex; align-items: center; gap: var(--spacing-sm); margin-bottom: var(--spacing-xs); }
        .cultivo-title h3 { font-size: 1.0625rem; font-weight: 600; }
        .cultivo-variedad { font-size: 0.8125rem; color: var(--color-text-muted); margin-bottom: var(--spacing-md); }
        .cultivo-meta { display: flex; gap: var(--spacing-lg); font-size: 0.8125rem; color: var(--color-text-secondary); margin-bottom: var(--spacing-md); }
        .cultivo-meta i { width: 14px; color: var(--color-primary); }
        .cultivo-footer { display: flex; align-items: center; justify-content: space-between; padding-top: var(--spacing-md); border-top: 1px solid var(--color-border); }
        .cultivo-actions { display: flex; gap: var(--spacing-sm); }
        .cultivo-actions button { background: none; border: none; color: var(--color-text-muted); cursor: pointer; padding: var(--spacing-xs); font-size: 1rem; transition: var(--transition); border-radius: var(--radius-md); }
        .cultivo-actions button:hover { color: var(--color-primary); background: var(--color-background); }
        .last-event { font-size: 0.75rem; color: var(--color-text-muted); }
        
        .btn-new { display: flex; align-items: center; gap: var(--spacing-sm); padding: 0.6rem 1.25rem; background: var(--color-primary); color: white; border: none; border-radius: var(--radius-md); font-weight: 500; cursor: pointer; font-size: 0.875rem; transition: var(--transition); }
        .btn-new:hover { background: var(--color-primary-dark); transform: translateY(-1px); }
        
        .empty-state { text-align: center; padding: 3rem; background: var(--color-surface); border-radius: var(--radius-lg); border: 1px solid var(--color-border); }
        .empty-state i { font-size: 3rem; color: var(--color-text-muted); margin-bottom: var(--spacing-md); }
        .empty-state p { color: var(--color-text-muted); margin-bottom: var(--spacing-lg); }
        
        /* === BOTTOM NAV (SOLO MOBILE) === */
        .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: var(--bottom-nav-height); background: var(--color-surface); border-top: 1px solid var(--color-border); z-index: 100; }
        .bottom-nav-items { display: flex; align-items: center; justify-content: space-around; height: 100%; max-width: 500px; margin: 0 auto; }
        .bottom-nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; color: var(--color-text-muted); text-decoration: none; font-size: 0.6875rem; transition: var(--transition); }
        .bottom-nav-item i { font-size: 1.2rem; }
        .bottom-nav-item.active { color: var(--color-primary); }
        .fab-button { width: 50px; height: 50px; border-radius: 50%; background: var(--color-primary); color: white; border: none; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; cursor: pointer; box-shadow: var(--shadow-lg); margin-top: -25px; }
        
        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            .sidebar { display: none !important; }
            .sidebar-toggle { display: none !important; }
            .main-content { margin-left: 0 !important; padding-bottom: var(--bottom-nav-height); }
            .header { padding: 0 var(--spacing-md); }
            .mobile-logo { display: flex; }
            .page-title { display: none; }
            .content { padding: var(--spacing-md); }
            .cultivos-grid { grid-template-columns: 1fr; }
            .bottom-nav { display: block; }
            .search-bar { max-width: 100%; }
        }
        
        @media (min-width: 769px) {
            .sidebar-toggle { display: flex; }
            .mobile-logo { display: none; }
            .page-title { display: block; }
            .bottom-nav { display: none !important; }
        }
        
        .offline-banner { background: var(--color-warning); color: white; padding: var(--spacing-sm) var(--spacing-xl); text-align: center; font-size: 0.875rem; display: none; }
        .offline-banner.show { display: block; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- SIDEBAR (IDÉNTICO AL DASHBOARD) -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="../../assets/img/logo.png" alt="PIXCAPP" class="sidebar-logo" onerror="this.src='https://placehold.co/36x36/2E7D32/white?text=P'">
                <span class="sidebar-title">PIXCAPP</span>
            </div>
            <div class="sidebar-user">
                <div class="user-avatar" id="userAvatar"><i class="fas fa-user"></i></div>
                <div class="user-info">
                    <div class="user-name" id="sidebarUserName">Cargando...</div>
                    <div class="user-role">Agricultor</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="cultivos.html" class="nav-item active"><i class="fas fa-seedling"></i> Mis Cultivos</a>
                <a href="reportes.html" class="nav-item"><i class="fas fa-chart-bar"></i> Reportes</a>
                <a href="guia.html" class="nav-item"><i class="fas fa-book"></i> Guía de Cultivos</a>
                <a href="ingeniero.html" class="nav-item"><i class="fas fa-user-tie"></i> Mi Ingeniero</a>
                <a href="ajustes.html" class="nav-item"><i class="fas fa-cog"></i> Ajustes</a>
            </nav>
            <div class="sidebar-footer">
                <div class="connection-status">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">En línea</span>
                </div>
                <button class="nav-item" id="logoutBtn" style="width:100%;margin-top:var(--spacing-md);border:none;background:none;cursor:pointer;font-family:Inter,sans-serif;">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </div>
        </aside>
        
        <main class="main-content" id="mainContent">
            <div class="offline-banner" id="offlineBanner"><i class="fas fa-wifi-slash"></i> Modo sin conexión - Los datos pueden estar desactualizados</div>
            
            <header class="header">
                <div class="header-left">
                    <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
                    <div class="mobile-logo">
                        <img src="../../assets/img/logo.png" alt="PIXCAPP" class="mobile-logo-img" onerror="this.src='https://placehold.co/32x32/2E7D32/white?text=P'">
                        <span class="mobile-logo-text">PIXCAPP</span>
                    </div>
                    <h1 class="page-title">Mis Cultivos</h1>
                </div>
                <div class="header-right">
                    <button class="btn-new" id="newCultivoBtn"><i class="fas fa-plus"></i> Nueva Parcela</button>
                </div>
            </header>
            
            <div class="content">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Buscar parcela por nombre...">
                </div>
                
                <div class="cultivos-grid" id="cultivosGrid">
                    <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Cargando cultivos...</p></div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- BOTTOM NAV (SOLO MOBILE) -->
    <nav class="bottom-nav" id="bottomNav">
        <div class="bottom-nav-items">
            <a href="dashboard.html" class="bottom-nav-item"><i class="fas fa-home"></i><span>Inicio</span></a>
            <a href="cultivos.html" class="bottom-nav-item active"><i class="fas fa-seedling"></i><span>Cultivos</span></a>
            <button class="fab-button" id="fabButton"><i class="fas fa-plus"></i></button>
            <a href="reportes.html" class="bottom-nav-item"><i class="fas fa-chart-bar"></i><span>Reportes</span></a>
            <a href="perfil.html" class="bottom-nav-item"><i class="fas fa-user"></i><span>Perfil</span></a>
        </div>
    </nav>
    
    <!-- FAB Menu para móvil -->
    <div class="fab-menu" id="fabMenu" style="display: none; position: fixed; bottom: 80px; right: 20px; flex-direction: column; gap: 10px; z-index: 200;">
        <button class="fab-menu-item" onclick="window.location.href='registro-riego.html'" style="background: var(--color-surface); padding: 12px 20px; border-radius: 30px; box-shadow: var(--shadow-md); border: 1px solid var(--color-border); display: flex; align-items: center; gap: 10px; cursor: pointer;"><i class="fas fa-tint"></i> Registrar Riego</button>
        <button class="fab-menu-item" onclick="window.location.href='registro-plaga.html'" style="background: var(--color-surface); padding: 12px 20px; border-radius: 30px; box-shadow: var(--shadow-md); border: 1px solid var(--color-border); display: flex; align-items: center; gap: 10px; cursor: pointer;"><i class="fas fa-bug"></i> Reportar Plaga</button>
        <button class="fab-menu-item" onclick="window.location.href='registro-fertilizacion.html'" style="background: var(--color-surface); padding: 12px 20px; border-radius: 30px; box-shadow: var(--shadow-md); border: 1px solid var(--color-border); display: flex; align-items: center; gap: 10px; cursor: pointer;"><i class="fas fa-flask"></i> Fertilización</button>
        <button class="fab-menu-item" onclick="window.location.href='tomar-foto.html'" style="background: var(--color-surface); padding: 12px 20px; border-radius: 30px; box-shadow: var(--shadow-md); border: 1px solid var(--color-border); display: flex; align-items: center; gap: 10px; cursor: pointer;"><i class="fas fa-camera"></i> Tomar Foto</button>
    </div>
    
    <script>
        // ============================================
        // TEMA Y CONFIGURACIÓN INICIAL
        // ============================================
        (function(){ 
            const theme = localStorage.getItem('theme') || 'light'; 
            document.body.setAttribute('data-theme', theme); 
        })();
        
        window.addEventListener('storage', (e) => { 
            if(e.key === 'theme') document.body.setAttribute('data-theme', e.newValue || 'light'); 
        });
        
        // ============================================
        // VARIABLES GLOBALES
        // ============================================
        const API = '../../api';
        let currentUser = null;
        let allParcelas = [];
        
        // ============================================
        // CONEXIÓN / OFFLINE
        // ============================================
        function updateConnection() {
            const isOnline = navigator.onLine;
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const offlineBanner = document.getElementById('offlineBanner');
            
            if (statusDot) {
                statusDot.className = 'status-dot' + (isOnline ? '' : ' offline');
            }
            if (statusText) {
                statusText.textContent = isOnline ? 'En línea' : 'Sin conexión';
            }
            if (offlineBanner) {
                offlineBanner.classList.toggle('show', !isOnline);
            }
        }
        
        // ============================================
        // AUTH
        // ============================================
        async function checkAuth() {
            const token = localStorage.getItem('pixcapp_token');
            const user = JSON.parse(localStorage.getItem('pixcapp_user') || '{}');
            
            if (!token || !user.id) {
                window.location.href = '../../login.html';
                return false;
            }
            
            try {
                const response = await fetch(`${API}/auth/verify.php`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    }
                });
                const data = await response.json();
                
                if (!data.valid || user.rol !== 'agricultor') {
                    clearSession();
                    window.location.href = '../../login.html';
                    return false;
                }
                
                currentUser = data.user || user;
                return true;
            } catch (error) {
                // Si hay error de conexión, asumimos que el usuario es válido (modo offline)
                if (!navigator.onLine) {
                    currentUser = user;
                    return true;
                }
                return false;
            }
        }
        
        function clearSession() {
            localStorage.removeItem('pixcapp_token');
            localStorage.removeItem('pixcapp_user');
        }
        
        // ============================================
        // CARGAR PARCELAS
        // ============================================
        async function loadParcelas() {
            const token = localStorage.getItem('pixcapp_token');
            const grid = document.getElementById('cultivosGrid');
            
            try {
                const response = await fetch(`${API}/parcelas/listar.php`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await response.json();
                
                if (data.success) {
                    allParcelas = data.parcelas;
                    localStorage.setItem('pixcapp_cultivos', JSON.stringify(data.parcelas));
                    renderCultivos(allParcelas);
                } else {
                    throw new Error('Error al cargar');
                }
            } catch (error) {
                // Modo offline: cargar desde localStorage
                allParcelas = JSON.parse(localStorage.getItem('pixcapp_cultivos') || '[]');
                renderCultivos(allParcelas);
            }
        }
        
        function renderCultivos(parcelas) {
            const grid = document.getElementById('cultivosGrid');
            
            if (!parcelas.length) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-seedling"></i>
                        <p>No tienes parcelas registradas</p>
                        <button class="btn-new" onclick="window.location.href='nueva-parcela.html'">
                            <i class="fas fa-plus"></i> Crear primera parcela
                        </button>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = parcelas.map(parcela => {
                const estadoClass = parcela.estado === 'atencion' ? 'warning' : '';
                const estadoText = parcela.estado === 'saludable' ? 'Saludable' : 'Atención';
                const lat = parcela.latitud ? parseFloat(parcela.latitud).toFixed(4) : '---';
                const lng = parcela.longitud ? parseFloat(parcela.longitud).toFixed(4) : '---';
                
                return `
                    <div class="cultivo-card">
                        <div class="cultivo-image" style="background-image: url('../../${parcela.foto_principal || 'assets/img/placeholder-cultivo.jpg'}'); background-size: cover;">
                            <span class="cultivo-status ${estadoClass}">${estadoText}</span>
                        </div>
                        <div class="cultivo-body">
                            <div class="cultivo-title">
                                <i class="fas fa-seedling" style="color: var(--color-primary);"></i>
                                <h3>${escapeHtml(parcela.nombre)}</h3>
                            </div>
                            <div class="cultivo-variedad">
                                ${escapeHtml(parcela.cultivo_nombre || 'Maíz')} • ${escapeHtml(parcela.variedad || 'Blanco Criollo')}
                            </div>
                            <div class="cultivo-meta">
                                <span><i class="fas fa-calendar"></i> Día ${parcela.dias_desde_siembra || '-'}</span>
                                <span><i class="fas fa-map-marker-alt"></i> ${lat}°, ${lng}°</span>
                            </div>
                            <div class="cultivo-footer">
                                <span class="last-event">
                                    <i class="fas fa-history"></i> ${escapeHtml(parcela.ultimo_evento || 'Sin eventos')}
                                </span>
                                <div class="cultivo-actions">
                                    <button onclick="location.href='cultivo.html?id=${parcela.id}'" title="Ver detalles">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                    <button onclick="location.href='registro-riego.html?parcela=${parcela.id}'" title="Registrar riego">
                                        <i class="fas fa-tint"></i>
                                    </button>
                                    <button onclick="location.href='tomar-foto.html?parcela=${parcela.id}'" title="Tomar foto">
                                        <i class="fas fa-camera"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ============================================
        // FILTRO DE BÚSQUEDA
        // ============================================
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    const query = e.target.value.toLowerCase();
                    const filtered = allParcelas.filter(p => 
                        p.nombre.toLowerCase().includes(query) ||
                        (p.cultivo_nombre && p.cultivo_nombre.toLowerCase().includes(query))
                    );
                    renderCultivos(filtered);
                });
            }
        }
        
        // ============================================
        // FAB MENU (MÓVIL)
        // ============================================
        function setupFabMenu() {
            const fabButton = document.getElementById('fabButton');
            const fabMenu = document.getElementById('fabMenu');
            
            if (fabButton && fabMenu) {
                fabButton.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const isVisible = fabMenu.style.display === 'flex';
                    fabMenu.style.display = isVisible ? 'none' : 'flex';
                });
                
                document.addEventListener('click', (e) => {
                    if (fabMenu && !fabMenu.contains(e.target) && e.target !== fabButton) {
                        fabMenu.style.display = 'none';
                    }
                });
            }
        }
        
        // ============================================
        // INICIALIZACIÓN
        // ============================================
        async function init() {
            // Verificar autenticación
            const isAuthenticated = await checkAuth();
            if (!isAuthenticated) return;
            
            // Actualizar UI con datos del usuario
            if (currentUser) {
                const userNameElem = document.getElementById('sidebarUserName');
                const userAvatar = document.getElementById('userAvatar');
                
                if (userNameElem) userNameElem.textContent = currentUser.nombre;
                
                if (userAvatar) {
                    const initials = currentUser.nombre
                        .split(' ')
                        .map(n => n[0])
                        .join('')
                        .slice(0, 2)
                        .toUpperCase();
                    
                    if (currentUser.foto_perfil) {
                        userAvatar.innerHTML = `<img src="../../${currentUser.foto_perfil}" alt="${currentUser.nombre}">`;
                    } else {
                        userAvatar.innerHTML = initials;
                    }
                }
            }
            
            // Sidebar toggle (solo desktop)
            const sidebarToggle = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('mainContent');
            
            if (sidebarToggle && sidebar && mainContent) {
                sidebarToggle.addEventListener('click', () => {
                    sidebar.classList.toggle('collapsed');
                    mainContent.classList.toggle('expanded');
                });
            }
            
            // Logout
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', async () => {
                    const token = localStorage.getItem('pixcapp_token');
                    if (token) {
                        try {
                            await fetch(`${API}/auth/logout.php`, {
                                method: 'POST',
                                headers: { 'Authorization': 'Bearer ' + token }
                            });
                        } catch (e) {}
                    }
                    clearSession();
                    window.location.href = '../../login.html';
                });
            }
            
            // Nueva parcela
            const newCultivoBtn = document.getElementById('newCultivoBtn');
            if (newCultivoBtn) {
                newCultivoBtn.addEventListener('click', () => {
                    window.location.href = 'nueva-parcela.html';
                });
            }
            
            // Estado de conexión
            updateConnection();
            window.addEventListener('online', updateConnection);
            window.addEventListener('offline', updateConnection);
            
            // Configurar búsqueda y FAB
            setupSearch();
            setupFabMenu();
            
            // Cargar datos
            await loadParcelas();
        }
        
        // Iniciar la aplicación
        init();
    </script>
    <script src="app/assets/js/pwa-register.js"></script>
</body>
</html>
