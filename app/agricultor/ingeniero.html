<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#2E7D32">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Mi Ingeniero - PIXCAPP</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color-primary: #2E7D32;
            --color-primary-light: #4CAF50;
            --color-primary-dark: #1B5E20;
            --color-primary-soft: #E8F5E9;
            --color-background: #F5F7FA;
            --color-surface: #FFFFFF;
            --color-text-primary: #1A202C;
            --color-text-secondary: #2D3748;
            --color-text-muted: #4A5568;
            --color-border: #E2E8F0;
            --color-success: #38A169;
            --color-warning: #ED8936;
            --color-error: #E53E3E;
            --color-info: #3182CE;
            --sidebar-width: 260px;
            --header-height: 60px;
            --bottom-nav-height: 65px;
            --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.5rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-full: 9999px;
            --transition: all 0.25s ease;
        }
        
        [data-theme="dark"] {
            --color-primary: #66BB6A;
            --color-primary-light: #81C784;
            --color-primary-dark: #388E3C;
            --color-primary-soft: #1B2E1F;
            --color-background: #0F172A;
            --color-surface: #1E293B;
            --color-text-primary: #F8FAFC;
            --color-text-secondary: #E2E8F0;
            --color-text-muted: #94A3B8;
            --color-border: #334155;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-background);
            color: var(--color-text-primary);
            min-height: 100vh;
            transition: var(--transition);
        }
        
        .app-container { display: flex; min-height: 100vh; }
        
        /* === SIDEBAR === */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--color-surface);
            border-right: 1px solid var(--color-border);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 200;
            transition: transform 0.3s ease;
            transform: translateX(0);
            display: flex;
            flex-direction: column;
        }
        .sidebar.collapsed { transform: translateX(-100%); }
        
        .sidebar-header {
            padding: var(--spacing-lg);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }
        .sidebar-logo {
            height: 36px;
            width: auto;
        }
        body:not([data-theme="dark"]) .sidebar-logo { filter: brightness(0) invert(0); }
        [data-theme="dark"] .sidebar-logo { filter: brightness(0) invert(1); }
        .sidebar-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--color-primary);
        }
        
        .sidebar-user {
            padding: var(--spacing-lg);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }
        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-full);
            background: var(--color-primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            overflow: hidden;
        }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-name { font-weight: 600; font-size: 0.9375rem; }
        .user-role {
            font-size: 0.75rem;
            color: var(--color-text-muted);
            text-transform: uppercase;
        }
        
        .sidebar-nav {
            flex: 1;
            padding: var(--spacing-md);
            overflow-y: auto;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            padding: var(--spacing-md);
            color: var(--color-text-secondary);
            text-decoration: none;
            border-radius: var(--radius-md);
            transition: var(--transition);
            margin-bottom: 2px;
            font-size: 0.9375rem;
        }
        .nav-item i { width: 22px; font-size: 1.1rem; text-align: center; }
        .nav-item:hover {
            background: var(--color-background);
            color: var(--color-primary);
        }
        .nav-item.active {
            background: var(--color-primary);
            color: white;
        }
        
        .sidebar-footer {
            padding: var(--spacing-lg);
            border-top: 1px solid var(--color-border);
        }
        .connection-status {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: 0.8125rem;
            color: var(--color-text-muted);
            margin-bottom: var(--spacing-md);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-success);
        }
        .status-dot.offline { background: var(--color-error); }
        
        /* === MAIN CONTENT === */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            transition: margin-left 0.3s ease;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .main-content.expanded { margin-left: 0; }
        
        /* === HEADER === */
        .header {
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            padding: 0 var(--spacing-xl);
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: var(--header-height);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .header-left { display: flex; align-items: center; gap: var(--spacing-md); }
        .sidebar-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.35rem;
            color: var(--color-text-primary);
            cursor: pointer;
            padding: var(--spacing-sm);
        }
        .mobile-logo {
            display: none;
            align-items: center;
            gap: var(--spacing-sm);
        }
        .mobile-logo-img {
            height: 32px;
            width: auto;
        }
        body:not([data-theme="dark"]) .mobile-logo-img { filter: brightness(0) invert(0); }
        [data-theme="dark"] .mobile-logo-img { filter: brightness(0) invert(1); }
        .mobile-logo-text {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--color-primary);
        }
        .page-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--color-text-primary);
        }
        
        /* === CONTENIDO PRINCIPAL === */
        .content {
            flex: 1;
            padding: var(--spacing-xl);
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* Cards */
        .card {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            overflow: hidden;
            margin-bottom: var(--spacing-xl);
        }
        
        .card-body {
            padding: var(--spacing-xl);
        }
        
        /* Perfil del ingeniero */
        .ingeniero-perfil {
            display: flex;
            align-items: center;
            gap: var(--spacing-xl);
            flex-wrap: wrap;
        }
        
        .ingeniero-avatar {
            width: 80px;
            height: 80px;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: 600;
            flex-shrink: 0;
        }
        
        .ingeniero-datos {
            flex: 1;
        }
        
        .ingeniero-nombre {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .ingeniero-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            background: var(--color-primary-soft);
            color: var(--color-primary);
            border-radius: var(--radius-full);
            font-size: 0.65rem;
            font-weight: 600;
            margin-bottom: var(--spacing-md);
        }
        
        .info-grid-ing {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-md);
            margin-top: var(--spacing-sm);
        }
        
        .info-item-ing {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            background: var(--color-background);
            padding: 6px 12px;
            border-radius: var(--radius-full);
        }
        
        .info-icon-ing {
            color: var(--color-primary);
            font-size: 0.8rem;
        }
        
        .info-label-ing {
            font-size: 0.65rem;
            color: var(--color-text-muted);
        }
        
        .info-value-ing {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--color-text-primary);
        }
        
        /* Recomendaciones */
        .recomendaciones-header {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-md) var(--spacing-xl);
            border-bottom: 1px solid var(--color-border);
        }
        
        .recomendaciones-header i {
            color: var(--color-primary);
        }
        
        .recomendaciones-header h3 {
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .recomendacion-item {
            padding: var(--spacing-md) var(--spacing-xl);
            border-bottom: 1px solid var(--color-border);
        }
        
        .recomendacion-fecha {
            font-size: 0.65rem;
            color: var(--color-text-muted);
            margin-bottom: 4px;
        }
        
        .recomendacion-texto {
            font-size: 0.85rem;
            color: var(--color-text-secondary);
            line-height: 1.4;
        }
        
        .empty-recomendaciones {
            text-align: center;
            padding: var(--spacing-xl);
            color: var(--color-text-muted);
            font-size: 0.85rem;
        }
        
        /* Acciones */
        .acciones {
            padding: var(--spacing-lg) var(--spacing-xl);
            border-top: 1px solid var(--color-border);
            text-align: center;
        }
        
        /* Botones */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: 0.4rem 0.9rem;
            font-size: 0.75rem;
            font-weight: 500;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
        }
        
        .btn-primary {
            background: var(--color-primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--color-primary-dark);
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--color-border);
            color: var(--color-text-secondary);
        }
        
        .btn-outline:hover {
            background: var(--color-background);
            border-color: var(--color-primary);
            color: var(--color-primary);
        }
        
        .btn-danger {
            background: transparent;
            border: 1px solid var(--color-error);
            color: var(--color-error);
        }
        
        .btn-danger:hover {
            background: var(--color-error);
            color: white;
        }
        
        /* Estado vacío */
        .empty-state {
            text-align: center;
            padding: var(--spacing-xl);
        }
        
        .empty-state i {
            font-size: 2.5rem;
            color: var(--color-text-muted);
            margin-bottom: var(--spacing-md);
        }
        
        .empty-state h3 {
            font-size: 1rem;
            margin-bottom: var(--spacing-xs);
        }
        
        .empty-state p {
            font-size: 0.8rem;
            color: var(--color-text-muted);
            margin-bottom: var(--spacing-md);
        }
        
        /* Buscador - Compacto */
        .buscador-container {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            overflow: hidden;
            margin-bottom: var(--spacing-xl);
        }
        
        .buscador-input {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: 10px var(--spacing-lg);
            background: var(--color-background);
            border-bottom: 1px solid var(--color-border);
        }
        
        .buscador-input i {
            color: var(--color-text-muted);
            font-size: 0.85rem;
        }
        
        .buscador-input input {
            flex: 1;
            padding: 8px 0;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            color: var(--color-text-primary);
            background: transparent;
            border: none;
            outline: none;
        }
        
        .buscador-input input::placeholder {
            color: var(--color-text-muted);
        }
        
        .resultados-busqueda {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .resultado-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px var(--spacing-lg);
            border-bottom: 1px solid var(--color-border);
            transition: var(--transition);
        }
        
        .resultado-item:hover {
            background: var(--color-background);
        }
        
        .resultado-info {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }
        
        .resultado-avatar {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-full);
            background: var(--color-primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .resultado-datos h4 {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 2px;
        }
        
        .resultado-datos p {
            font-size: 0.7rem;
            color: var(--color-text-muted);
        }
        
        .resultado-btn {
            padding: 4px 10px;
            font-size: 0.7rem;
        }
        
        .alert-busqueda {
            padding: var(--spacing-lg);
            text-align: center;
            color: var(--color-text-muted);
            font-size: 0.8rem;
        }
        
        .loading-state {
            text-align: center;
            padding: var(--spacing-xl);
        }
        
        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 2px solid var(--color-border);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto var(--spacing-md);
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Offline banner */
        .offline-banner {
            background: var(--color-warning);
            color: white;
            padding: var(--spacing-sm) var(--spacing-xl);
            text-align: center;
            font-size: 0.75rem;
            display: none;
        }
        .offline-banner.show { display: block; }
        
        /* BOTTOM NAV */
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--bottom-nav-height);
            background: var(--color-surface);
            border-top: 1px solid var(--color-border);
            z-index: 100;
        }
        .bottom-nav-items {
            display: flex;
            align-items: center;
            justify-content: space-around;
            height: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            color: var(--color-text-muted);
            text-decoration: none;
            font-size: 0.65rem;
        }
        .bottom-nav-item i { font-size: 1.1rem; }
        .bottom-nav-item.active { color: var(--color-primary); }
        .fab-button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--color-primary);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            margin-top: -24px;
        }
        
        .fab-menu {
            position: fixed;
            bottom: 80px;
            right: 20px;
            display: none;
            flex-direction: column;
            gap: var(--spacing-sm);
            z-index: 200;
        }
        .fab-menu.active { display: flex; }
        .fab-menu-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            background: var(--color-surface);
            padding: 8px 16px;
            border-radius: 2rem;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--color-border);
            color: var(--color-text-primary);
            font-size: 0.75rem;
            cursor: pointer;
        }
        
        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            .sidebar { display: none !important; }
            .sidebar-toggle { display: none !important; }
            .main-content { margin-left: 0 !important; padding-bottom: var(--bottom-nav-height); }
            .header { padding: 0 var(--spacing-md); }
            .mobile-logo { display: flex; }
            .page-title { display: none; }
            .content { padding: var(--spacing-md); }
            .bottom-nav { display: block; }
            .ingeniero-perfil { flex-direction: column; text-align: center; }
            .info-grid-ing { justify-content: center; }
        }
        
        @media (min-width: 769px) {
            .sidebar-toggle { display: flex; }
            .mobile-logo { display: none; }
            .page-title { display: block; }
            .bottom-nav { display: none !important; }
        }
    </style>
</head>
<body>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav" id="bottomNav">
        <div class="bottom-nav-items">

            <a href="cultivos.html" class="bottom-nav-item"><i class="fas fa-seedling"></i><span>Cultivos</span></a>

            <a href="reportes.html" class="bottom-nav-item"><i class="fas fa-chart-bar"></i><span>Reportes</span></a>

    <!-- FAB MENU -->
    <div class="fab-menu" id="fabMenu">
        <button class="fab-menu-item" onclick="location.href='registro-riego.html'"><i class="fas fa-tint"></i> Riego</button>
        <button class="fab-menu-item" onclick="location.href='registro-plaga.html'"><i class="fas fa-bug"></i> Plaga</button>
        <button class="fab-menu-item" onclick="location.href='registro-fertilizacion.html'"><i class="fas fa-flask"></i> Fertilización</button>
        <button class="fab-menu-item" onclick="location.href='tomar-foto.html'"><i class="fas fa-camera"></i> Foto</button>
    </div>
    
    <script>
        // ============================================
        // TEMA
        // ============================================
        (function(){ 
            const theme = localStorage.getItem('theme') || 'light'; 
            document.body.setAttribute('data-theme', theme); 
        })();
        
        window.addEventListener('storage', (e) => { 
            if(e.key === 'theme') document.body.setAttribute('data-theme', e.newValue || 'light'); 
        });
        
        // ============================================
        // CONFIGURACIÓN
        // ============================================
        const API = '../../api';
        let currentUser = null;
        let modoBusqueda = false;
        
        // ============================================
        // CONEXIÓN
        // ============================================
        function updateConnection() {
            const isOnline = navigator.onLine;
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const offlineBanner = document.getElementById('offlineBanner');
            
            if (statusDot) {
                statusDot.className = 'status-dot' + (isOnline ? '' : ' offline');
            }
            if (statusText) {
                statusText.textContent = isOnline ? 'En línea' : 'Sin conexión';
            }
            if (offlineBanner) {
                offlineBanner.classList.toggle('show', !isOnline);
            }
        }
        
        // ============================================
        // AUTH
        // ============================================
        async function checkAuth() {
            const token = localStorage.getItem('pixcapp_token');
            const user = JSON.parse(localStorage.getItem('pixcapp_user') || '{}');
            
            if (!token || !user.id) {
                window.location.href = '../../login.html';
                return false;
            }
            
            try {
                const response = await fetch(`${API}/auth/verify.php`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    }
                });
                const data = await response.json();
                
                if (!data.valid) {
                    clearSession();
                    window.location.href = '../../login.html';
                    return false;
                }
                
                currentUser = data.user || user;
                return true;
            } catch (error) {
                if (!navigator.onLine) {
                    currentUser = user;
                    return true;
                }
                return false;
            }
        }
        
        function clearSession() {
            localStorage.removeItem('pixcapp_token');
            localStorage.removeItem('pixcapp_user');
        }
        
        // ============================================
        // MOSTRAR VISTA PRINCIPAL (INGENIERO ASIGNADO)
        // ============================================
        function mostrarVistaPrincipal(ingeniero, recomendaciones) {
            const container = document.getElementById('mainContentArea');
            const iniciales = ingeniero.nombre.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
            
            container.innerHTML = `
                <div class="card">
                    <div class="card-body">
                        <div class="ingeniero-perfil">
                            <div class="ingeniero-avatar">${iniciales}</div>
                            <div class="ingeniero-datos">
                                <div class="ingeniero-nombre">${escapeHtml(ingeniero.nombre)}</div>
                                <span class="ingeniero-badge"><i class="fas fa-check-circle"></i> Asesor asignado</span>
                                <div class="info-grid-ing">
                                    <div class="info-item-ing"><i class="info-icon-ing fas fa-phone"></i><span class="info-label-ing">Tel:</span><span class="info-value-ing">${ingeniero.telefono || 'N/A'}</span></div>
                                    <div class="info-item-ing"><i class="info-icon-ing fas fa-envelope"></i><span class="info-label-ing">Email:</span><span class="info-value-ing">${ingeniero.correo || 'N/A'}</span></div>
                                    <div class="info-item-ing"><i class="info-icon-ing fas fa-id-card"></i><span class="info-label-ing">Cédula:</span><span class="info-value-ing">${ingeniero.cedula || 'N/A'}</span></div>
                                    <div class="info-item-ing"><i class="info-icon-ing fas fa-graduation-cap"></i><span class="info-label-ing">Especialidad:</span><span class="info-value-ing">${ingeniero.especialidad || 'Agronomía'}</span></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="recomendaciones-header">
                        <i class="fas fa-lightbulb"></i>
                        <h3>Recomendaciones</h3>
                    </div>
                    ${recomendaciones && recomendaciones.length ? 
                        recomendaciones.map(r => `
                            <div class="recomendacion-item">
                                <div class="recomendacion-fecha"><i class="fas fa-calendar-alt"></i> ${formatDate(r.fecha_envio)}</div>
                                <div class="recomendacion-texto">${escapeHtml(r.mensaje)}</div>
                            </div>
                        `).join('') : 
                        '<div class="empty-recomendaciones"><i class="fas fa-inbox"></i> Sin recomendaciones</div>'
                    }
                </div>
                
                <div class="acciones">
                    <button class="btn btn-danger" id="btnEliminar">
                        <i class="fas fa-user-minus"></i> Eliminar asesor
                    </button>
                </div>
            `;
            
            document.getElementById('btnEliminar')?.addEventListener('click', () => eliminarIngeniero());
        }
        
        // ============================================
        // MOSTRAR VISTA DE BÚSQUEDA
        // ============================================
        function mostrarVistaBusqueda() {
            const container = document.getElementById('mainContentArea');
            
            container.innerHTML = `
                <div class="buscador-container">
                    <div class="buscador-input">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Buscar ingeniero por nombre, teléfono o especialidad..." autocomplete="off">
                    </div>
                    <div class="resultados-busqueda" id="resultadosBusqueda">
                        <div class="alert-busqueda"><i class="fas fa-info-circle"></i> Escribe al menos 2 caracteres para buscar</div>
                    </div>
                </div>
            `;
            
            const searchInput = document.getElementById('searchInput');
            let debounceTimeout;
            
            searchInput.addEventListener('input', function() {
                clearTimeout(debounceTimeout);
                const query = this.value.trim();
                
                if (query.length < 2) {
                    document.getElementById('resultadosBusqueda').innerHTML = '<div class="alert-busqueda"><i class="fas fa-info-circle"></i> Escribe al menos 2 caracteres para buscar</div>';
                    return;
                }
                
                debounceTimeout = setTimeout(() => buscarIngenieros(query), 300);
            });
            
            searchInput.focus();
        }
        
        async function buscarIngenieros(query) {
            const token = localStorage.getItem('pixcapp_token');
            const resultadosDiv = document.getElementById('resultadosBusqueda');
            
            resultadosDiv.innerHTML = '<div class="alert-busqueda"><i class="fas fa-spinner fa-spin"></i> Buscando...</div>';
            
            try {
                const response = await fetch(`${API}/ingenieros/buscar.php?q=${encodeURIComponent(query)}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await response.json();
                
                if (data.success && data.ingenieros && data.ingenieros.length) {
                    resultadosDiv.innerHTML = data.ingenieros.map(ing => {
                        const iniciales = ing.nombre.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
                        return `
                            <div class="resultado-item">
                                <div class="resultado-info">
                                    <div class="resultado-avatar">${iniciales}</div>
                                    <div class="resultado-datos">
                                        <h4>${escapeHtml(ing.nombre)}</h4>
                                        <p>${ing.telefono || ''} ${ing.especialidad ? '• ' + ing.especialidad : ''}</p>
                                    </div>
                                </div>
                                <button class="btn btn-primary resultado-btn" onclick="solicitarIngeniero(${ing.id}, '${escapeHtml(ing.nombre)}')">
                                    <i class="fas fa-handshake"></i> Solicitar
                                </button>
                            </div>
                        `;
                    }).join('');
                } else {
                    resultadosDiv.innerHTML = '<div class="alert-busqueda"><i class="fas fa-user-slash"></i> No se encontraron ingenieros</div>';
                }
            } catch (error) {
                resultadosDiv.innerHTML = '<div class="alert-busqueda"><i class="fas fa-exclamation-triangle"></i> Error de conexión</div>';
            }
        }
        
        // ============================================
        // CARGAR INGENIERO ASIGNADO
        // ============================================
        async function loadIngeniero() {
            const token = localStorage.getItem('pixcapp_token');
            const container = document.getElementById('mainContentArea');
            
            container.innerHTML = '<div class="loading-state"><div class="loading-spinner"></div><p>Cargando...</p></div>';
            
            try {
                const response = await fetch(`${API}/ingenieros/mi-ingeniero.php`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await response.json();
                
                if (data.success && data.ingeniero) {
                    mostrarVistaPrincipal(data.ingeniero, data.recomendaciones);
                } else {
                    mostrarVistaBusqueda();
                }
            } catch (error) {
                container.innerHTML = `
                    <div class="card">
                        <div class="card-body">
                            <div class="empty-state">
                                <i class="fas fa-exclamation-triangle"></i>
                                <h3>Error de conexión</h3>
                                <button class="btn btn-outline" onclick="location.reload()">
                                    <i class="fas fa-sync-alt"></i> Reintentar
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }
        }
        
        async function eliminarIngeniero() {
            if (!confirm('¿Eliminar a tu ingeniero asesor?')) return;
            
            const token = localStorage.getItem('pixcapp_token');
            
            try {
                const response = await fetch(`${API}/ingenieros/eliminar.php`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    }
                });
                const data = await response.json();
                
                if (data.success) {
                    mostrarVistaBusqueda();
                } else {
                    alert(data.message || 'Error al eliminar');
                }
            } catch (error) {
                alert('Error de conexión');
            }
        }
        
        async function solicitarIngeniero(id, nombre) {
            if (!confirm(`¿Enviar solicitud a ${nombre}?`)) return;
            
            const token = localStorage.getItem('pixcapp_token');
            
            try {
                const response = await fetch(`${API}/ingenieros/solicitar.php`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ ingeniero_id: id })
                });
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ Solicitud enviada exitosamente');
                    loadIngeniero();
                } else {
                    alert(data.message || 'Error al enviar');
                }
            } catch (error) {
                alert('Error de conexión');
            }
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('es-MX', { day: 'numeric', month: 'short', year: 'numeric' });
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ============================================
        // SETUP FAB MENU
        // ============================================
        function setupFabMenu() {
            const fabButton = document.getElementById('fabButton');
            const fabMenu = document.getElementById('fabMenu');
            
            if (fabButton && fabMenu) {
                fabButton.addEventListener('click', (e) => {
                    e.stopPropagation();
                    fabMenu.classList.toggle('active');
                });
                
                document.addEventListener('click', (e) => {
                    if (fabMenu && !fabMenu.contains(e.target) && e.target !== fabButton) {
                        fabMenu.classList.remove('active');
                    }
                });
            }
        }
        
        // ============================================
        // INICIALIZACIÓN
        // ============================================
        async function init() {
            const isAuthenticated = await checkAuth();
            if (!isAuthenticated) return;
            
            if (currentUser) {
                document.getElementById('sidebarUserName').textContent = currentUser.nombre;
                const avatar = document.getElementById('userAvatar');
                const initials = currentUser.nombre.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
                avatar.innerHTML = currentUser.foto_perfil ? `<img src="../../${currentUser.foto_perfil}">` : initials;
            }
            
            const sidebarToggle = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('mainContent');
            
            if (sidebarToggle) {
                sidebarToggle.addEventListener('click', () => {
                    sidebar.classList.toggle('collapsed');
                    mainContent.classList.toggle('expanded');
                });
            }
            
            document.getElementById('logoutBtn').addEventListener('click', async () => {
                const token = localStorage.getItem('pixcapp_token');
                if (token) {
                    try {
                        await fetch(`${API}/auth/logout.php`, {
                            method: 'POST',
                            headers: { 'Authorization': 'Bearer ' + token }
                        });
                    } catch (e) {}
                }
                clearSession();
                window.location.href = '../../login.html';
            });
            
            updateConnection();
            window.addEventListener('online', updateConnection);
            window.addEventListener('offline', updateConnection);
            
            setupFabMenu();
            
            await loadIngeniero();
        }
        
        window.solicitarIngeniero = solicitarIngeniero;
        
        init();
    </script>
</body>
</html>
